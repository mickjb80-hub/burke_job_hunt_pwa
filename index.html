<style>

*{box-sizing:border-box}html,body{height:100%}body{margin:0;background:linear-gradient(180deg,#0b0f14 0%,#0d1219 45%,#090d12 100%);color:var(--text);font:15px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased}button,input,select,textarea{font:inherit}button{cursor:pointer}.hidden{display:none!important}.app-shell{min-height:100%;padding-bottom:calc(82px + var(--safe-bottom))}.topbar{position:sticky;top:0;z-index:40;background:rgba(11,15,20,.82);backdrop-filter:blur(14px);border-bottom:1px solid rgba(255,255,255,.06)}.top-inner{max-width:1240px;margin:0 auto;padding:14px 16px 12px;display:flex;align-items:center;gap:12px}.logo{width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,#1f6feb,#6eb6ff);display:grid;place-items:center;box-shadow:0 10px 24px rgba(47,129,247,.25);font-weight:900;letter-spacing:-.06em}.brand{min-width:0}.brand h1{margin:0;font-size:17px;letter-spacing:-.02em}.brand p{margin:2px 0 0;color:var(--muted);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.sync-pill{margin-left:auto;border:1px solid var(--line);background:rgba(23,33,45,.85);color:var(--muted);border-radius:999px;padding:6px 9px;font-size:12px;white-space:nowrap}.page{max-width:1240px;margin:0 auto;padding:14px 14px 26px}.hero{display:grid;gap:12px;margin-bottom:12px}@media(min-width:900px){.hero{grid-template-columns:1.2fr .8fr}.desktop-grid{display:grid;grid-template-columns:1.2fr .8fr;gap:14px}.desktop-3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}.desktop-2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}}.card{background:linear-gradient(180deg,rgba(17,24,33,.98),rgba(14,20,28,.98));border:1px solid rgba(255,255,255,.07);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;margin-bottom:12px}.card.soft{background:rgba(17,24,33,.72)}.card h2{margin:0 0 10px;font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}.card h3{margin:0 0 4px;font-size:16px;letter-spacing:-.01em}.muted{color:var(--muted)}.dim{color:var(--dim)}.small{font-size:12px}.row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}.row.nowrap{flex-wrap:nowrap}.spacer{flex:1}.btn{border:1px solid var(--line);background:var(--surface2);color:var(--text);border-radius:12px;padding:9px 12px;min-height:38px}.btn:hover{border-color:var(--line2)}.btn.primary{background:linear-gradient(135deg,#2478e9,#55a8ff);border-color:#55a8ff;color:white;font-weight:750}.btn.danger{background:#351819;border-color:#653032;color:#ffb4b5}.btn.ghost{background:transparent}.btn.small{min-height:30px;padding:5px 9px;border-radius:9px;font-size:12px}.btn.full{width:100%;justify-content:center}.quick-action{padding:16px;border-radius:22px;background:linear-gradient(135deg,#1b5fc9,#66b8ff);color:#fff;border:0;box-shadow:0 16px 35px rgba(47,129,247,.32);text-align:left;width:100%}.quick-action b{display:block;font-size:18px;letter-spacing:-.02em}.quick-action span{display:block;margin-top:4px;opacity:.92}.stat-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}@media(min-width:700px){.stat-grid{grid-template-columns:repeat(4,minmax(0,1fr))}}.stat{background:rgba(23,33,45,.72);border:1px solid var(--line);border-radius:16px;padding:12px}.stat .num{font-size:25px;font-weight:850;letter-spacing:-.04em}.stat .label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}.chip{display:inline-flex;align-items:center;gap:5px;border:1px solid var(--line);background:var(--chip);color:var(--text);border-radius:999px;padding:3px 8px;font-size:12px;white-space:nowrap}.chip.blue{background:#10243a;border-color:#1d4976;color:#9ad0ff}.chip.green{background:#0d2b1b;border-color:#1d5c39;color:#8cf0b7}.chip.amber{background:#33250d;border-color:#6b4c16;color:#ffd983}.chip.red{background:#351617;border-color:#6a2a2c;color:#ffb7b8}.chip.purple{background:#241b3d;border-color:#493579;color:#ceb7ff}.score{width:46px;height:46px;border-radius:15px;display:grid;place-items:center;font-weight:900;background:#1b2633;border:1px solid var(--line)}.score.good{background:#0d2b1b;color:#8cf0b7;border-color:#1d5c39}.score.mid{background:#33250d;color:#ffd983;border-color:#6b4c16}.score.bad{background:#351617;color:#ffb7b8;border-color:#6a2a2c}.list{display:grid;gap:9px}.empty{color:var(--muted);padding:16px;border:1px dashed var(--line);border-radius:14px;text-align:center}.action-card,.job-card,.contact-card{border:1px solid rgba(255,255,255,.07);background:rgba(23,33,45,.64);border-radius:17px;padding:12px}.action-card{display:grid;grid-template-columns:auto 1fr;gap:10px}.priority-dot{width:10px;height:10px;border-radius:999px;margin-top:7px;background:var(--blue)}.priority-dot.red{background:var(--red)}.priority-dot.amber{background:var(--amber)}.priority-dot.green{background:var(--green)}.job-head,.contact-head{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:start}.title{font-weight:850;letter-spacing:-.02em}.sub{font-size:13px;color:var(--muted);margin-top:2px}.risk{margin-top:9px;color:#ffd983;font-size:13px}.next{margin-top:9px;font-size:13px;color:#cfe7ff}.due{font-size:12px;color:var(--muted)}.due.overdue{color:#ffb4b5;font-weight:800}.due.today{color:#ffd983;font-weight:800}.toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px}.toolbar input,.toolbar select{flex:1;min-width:120px}.field{display:grid;gap:5px;margin-bottom:10px}.field label{font-size:11px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;font-weight:750}input,select,textarea{width:100%;background:var(--input);border:1px solid var(--line);color:var(--text);border-radius:12px;padding:10px 11px}textarea{min-height:90px;resize:vertical;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:13px}.form-grid{display:grid;gap:10px}@media(min-width:720px){.form-grid.two{grid-template-columns:repeat(2,minmax(0,1fr))}.form-grid.three{grid-template-columns:repeat(3,minmax(0,1fr))}.field.full{grid-column:1/-1}}details{border:1px solid rgba(255,255,255,.07);border-radius:17px;background:rgba(23,33,45,.45);overflow:hidden}summary{list-style:none;cursor:pointer}summary::-webkit-details-marker{display:none}.detail-body{padding:0 12px 12px}.section-title{margin:14px 0 8px;font-size:12px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);border-top:1px solid var(--line);padding-top:12px}.timeline{display:grid;gap:8px}.timeline-item{border-left:2px solid var(--blue);padding-left:9px;color:#cbd7e3;font-size:13px}.generated{white-space:pre-wrap;background:#071018;border:1px solid var(--line);border-radius:14px;padding:12px;min-height:150px;color:#dcecff}.bottom-nav{position:fixed;left:0;right:0;bottom:0;z-index:50;background:rgba(9,13,18,.88);backdrop-filter:blur(18px);border-top:1px solid rgba(255,255,255,.08);padding:8px 8px calc(8px + var(--safe-bottom));display:grid;grid-template-columns:repeat(5,1fr);gap:4px}.nav-btn{background:transparent;border:0;color:var(--muted);border-radius:14px;padding:7px 2px 6px;display:grid;gap:2px;place-items:center;font-size:11px}.nav-btn .ico{font-size:18px}.nav-btn.active{color:#fff;background:rgba(47,129,247,.18)}.badge{position:absolute;margin-left:24px;margin-top:-4px;background:var(--red);color:white;border-radius:999px;min-width:17px;height:17px;display:grid;place-items:center;font-size:10px;font-weight:900}.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:80;display:grid;place-items:end;padding:12px}.modal{width:100%;max-width:720px;max-height:88vh;overflow:auto;background:#0d131a;border:1px solid var(--line2);border-radius:24px;padding:16px;box-shadow:0 24px 60px rgba(0,0,0,.55)}@media(min-width:750px){.modal-backdrop{place-items:center}.modal{max-height:86vh}}.toast{position:fixed;left:50%;bottom:95px;transform:translateX(-50%);z-index:90;background:#0d2b1b;color:#8cf0b7;border:1px solid #1d5c39;border-radius:999px;padding:10px 14px;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:.18s}.toast.show{opacity:1}.warning{border:1px solid #6b4c16;background:#33250d;color:#ffd983;border-radius:14px;padding:10px;margin-bottom:12px}.danger-note{border:1px solid #6a2a2c;background:#351617;color:#ffb7b8;border-radius:14px;padding:10px;margin-bottom:12px}.split-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}.searchbox{position:relative}.searchbox input{padding-left:35px}.searchbox:before{content:'⌕';position:absolute;left:12px;top:9px;color:var(--muted);font-weight:900}.mini-link{color:#9ad0ff;text-decoration:none}.mini-link:hover{text-decoration:underline}.page-title{display:flex;align-items:center;gap:8px;margin:4px 0 12px}.page-title h2{margin:0;font-size:22px;letter-spacing:-.04em}.pill-tabs{display:flex;gap:6px;overflow:auto;padding-bottom:3px}.pill-tabs button{white-space:nowrap;border:1px solid var(--line);background:var(--surface2);color:var(--muted);border-radius:999px;padding:7px 10px}.pill-tabs button.active{background:#10243a;border-color:#1d4976;color:#9ad0ff}.kbd{font:12px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;background:#081018;border:1px solid var(--line);border-radius:8px;padding:2px 5px;color:#c7d8e8}
.logo.mycareer-logo{line-height:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0}.logo.mycareer-logo span{font-size:10px;letter-spacing:0;font-weight:800}.logo.mycareer-logo b{font-size:22px;line-height:.9;letter-spacing:-.08em}
@media(max-width:680px){
  :root{--radius:15px}
  html{-webkit-text-size-adjust:100%}
  body{overflow-x:hidden;font-size:16px}
  .app-shell{padding-bottom:calc(78px + var(--safe-bottom))}
  .top-inner{padding:calc(10px + env(safe-area-inset-top,0px)) 12px 9px;gap:10px}
  .logo{width:38px;height:38px;border-radius:12px;flex:0 0 38px}
  .logo.mycareer-logo span{font-size:9px}.logo.mycareer-logo b{font-size:20px}
  .brand h1{font-size:16px}.brand p{max-width:55vw}
  .sync-pill{padding:5px 8px;font-size:11px;max-width:76px;overflow:hidden;text-overflow:ellipsis}
  .page{padding:12px 10px 18px}
  .page-title{margin:2px 0 10px}.page-title h2{font-size:20px}
  .card{padding:12px;margin-bottom:10px;border-radius:15px}
  .quick-action{border-radius:17px;padding:14px}.quick-action b{font-size:17px}
  .stat-grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
  .stat{padding:10px;border-radius:14px}.stat .num{font-size:22px}
  .toolbar{display:grid;grid-template-columns:1fr;gap:8px}
  .toolbar input,.toolbar select,.toolbar .searchbox,.toolbar .pill-tabs,.toolbar .btn{width:100%;min-width:0}
  .pill-tabs{margin-inline:-2px;padding:0 2px 4px;scroll-snap-type:x proximity}
  .pill-tabs button{scroll-snap-align:start;min-height:40px}
  .btn,input,select,textarea{font-size:16px}
  .btn{min-height:44px;padding:10px 12px;touch-action:manipulation}
  .btn.small{min-height:36px;padding:7px 10px}
  input,select,textarea{min-height:44px;padding:10px 12px}
  textarea{min-height:118px}
  .split-actions{grid-template-columns:1fr}
  .job-card,.contact-card,.action-card,summary{min-width:0}
  .job-card,.contact-card,.action-card{border-radius:14px;padding:11px}
  .job-head,.contact-head{grid-template-columns:minmax(0,1fr) auto;gap:8px}
  .title,.sub,.next,.risk{overflow-wrap:anywhere}
  .row{gap:6px}.row .spacer{display:none}.modal .row .spacer{display:block}
  .score{width:42px;height:42px;border-radius:13px;font-size:14px}
  .chip{max-width:100%;overflow:hidden;text-overflow:ellipsis}
  .action-card{grid-template-columns:12px minmax(0,1fr);gap:9px}
  .priority-dot{width:9px;height:9px}
  .detail-body{padding:0 10px 10px}
  .section-title{margin:12px 0 8px}
  .generated{font-size:13px;max-height:48vh;overflow:auto}
  .modal-backdrop{padding:0;align-items:end}
  .modal{max-width:none;max-height:92vh;border-radius:22px 22px 0 0;padding:14px 12px calc(14px + var(--safe-bottom))}
  .bottom-nav{padding:6px 5px calc(6px + var(--safe-bottom));gap:2px}
  .nav-btn{min-width:0;border-radius:12px;font-size:10px;padding:6px 1px 5px}
  .nav-btn .ico{font-size:17px}
  .badge{margin-left:20px}
}
@media(max-width:380px){
  .brand p{display:none}
  .sync-pill{display:none}
  .page{padding-inline:8px}
  .stat .label{font-size:10px}
  .nav-btn{font-size:9px}
  .nav-btn .ico{font-size:16px}
}
@media(min-width:681px){
  .split-actions{grid-template-columns:1fr 1fr}
}
</style>

<body>
<div class="app-shell">
  <header class="topbar">
    <div class="top-inner">
      <div class="logo mycareer-logo" aria-hidden="true"><span>My</span><b>C</b></div>
      <div class="brand"><h1>CareerConsole</h1><p id="tagline">v13 · mobile-first job search cockpit</p></div>
      <div class="sync-pill" id="syncStatus">Local</div>
    </div>
  </header>
  <main class="page" id="app" tabindex="-1"></main>
</div>
<nav class="bottom-nav" id="nav" aria-label="Primary navigation">
  <button class="nav-btn active" data-view="today"><span class="ico">✓</span><span>Today</span><span class="badge hidden" id="badgeToday">0</span></button>
  <button class="nav-btn" data-view="jobs"><span class="ico">💼</span><span>Jobs</span></button>
  <button class="nav-btn" data-view="contacts"><span class="ico">👤</span><span>Contacts</span><span class="badge hidden" id="badgeContacts">0</span></button>
  <button class="nav-btn" data-view="prep"><span class="ico">📄</span><span>Prep</span></button>
  <button class="nav-btn" data-view="more"><span class="ico">⚙</span><span>More</span></button>
</nav>
<div class="toast" id="toast">Saved</div>
<script>
'use strict';
const APP_VERSION = '13.0.1';
const STORE_KEY = 'careerconsole_v13_state';
const OLD_KEYS = ['burke_v12_state','burke_v11_state'];
const app = document.getElementById('app');
let currentView = 'today';
let jobFilter = {q:'', decision:'', stage:''};
let contactFilter = 'all';
let prepOutput = '';

const DEFAULT_STATE = {
  version: 13,
  createdAt: isoNow(),
  updatedAt: isoNow(),
  profile: { name:'', email:'', phone:'', location:'Greater Liverpool Area' },
  settings: { originPostcode:'', maxCommute:90, salaryMinimum:35000, preferredSalary:40000, drivingAllowed:false, maxTravel:'under25', weeklyReviewDay:'Monday' },
  jobs: [],
  contacts: [],
  prep: {
    cvVariants: [
      {id:uid('cv'), name:'Medical diagnostics / IVD', file:'', notes:'Abbott, PCR, automation, regulated service.'},
      {id:uid('cv'), name:'Rail safety-critical / depot', file:'', notes:'Submarine safety-critical maintenance, depot/fleet support.'},
      {id:uid('cv'), name:'Manufacturing reliability / automation', file:'', notes:'PPM, RCA, automated systems, fixed-site reliability.'}
    ],
    evidence: [],
    starExamples: [],
    templates: seedTemplates()
  }
};
let STATE = loadState();

function uid(prefix='id'){return prefix+'_'+Math.random().toString(36).slice(2,9)+'_'+Date.now().toString(36).slice(-4)}
function isoNow(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function escapeHTML(str){return String(str??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
function clone(x){return JSON.parse(JSON.stringify(x))}
function todayDate(){const d=new Date();d.setHours(0,0,0,0);return d}
function parseISODate(iso){if(!iso)return null;const p=String(iso).split('-').map(Number);if(p.length<3||!p[0]||!p[1]||!p[2])return null;const d=new Date(p[0],p[1]-1,p[2]);d.setHours(0,0,0,0);return d}
function daysUntil(iso){const d=parseISODate(iso);if(!d)return null;return Math.round((d-todayDate())/86400000)}
function daysAgo(iso){const d=daysUntil(iso);return d===null?null:-d}
function fmtDate(iso){return iso||'Not set'}
function money(n){return n||n===0?'£'+Number(n).toLocaleString('en-GB'):'Not set'}
function normalise(s){return String(s||'').toLowerCase().replace(/[^a-z0-9@.]+/g,' ').trim()}
function extractEmail(text){const m=String(text||'').match(/[A-Z0-9._%+-]+@[A-Z0-9.-]+\.[A-Z]{2,}/i);return m?m[0]:''}
function extractPhone(text){const m=String(text||'').match(/(?:\+?44\s?|0)\d(?:[\s-]?\d){8,11}/);return m?m[0].trim():''}
function toast(msg='Saved'){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toast._t);toast._t=setTimeout(()=>t.classList.remove('show'),1500)}
function downloadFile(name, content, type='application/json'){const blob=new Blob([content],{type});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=name;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),700)}
function setSyncStatus(text){document.getElementById('syncStatus').textContent=text}
function seedTemplates(){return [
  {id:'recruiter_followup', name:'Recruiter follow-up', type:'recruiter-followup', body:'Hi {contactName},\n\nI am checking in on the {role} role at {company}. Could you confirm whether the role is still live, the salary range, and whether regular driving or travel is essential?\n\nBest,\n{profileName}'},
  {id:'salary_clarify', name:'Salary / practical fit check', type:'salary-check', body:'Hi {contactName},\n\nBefore progressing, could I confirm the salary range, fixed-site location, shift pattern, and whether any regular driving or territory travel is required for {role}?\n\nBest,\n{profileName}'},
  {id:'linkedin_intro', name:'LinkedIn message', type:'linkedin', body:'Hi {contactName}, I am interested in the {role} role at {company}. My background is in safety-critical engineering and regulated diagnostic equipment support. Could you confirm who is best to speak to about the vacancy? Thanks, {profileName}'}
]}

function loadState(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(raw){const parsed=JSON.parse(raw);const state=normaliseV13(parsed);autoLinkContacts(state);return state}
    for(const k of OLD_KEYS){const old=localStorage.getItem(k);if(old){const migrated=migrateV12(JSON.parse(old));saveState(migrated);return migrated}}
  }catch(e){console.warn('Load failed',e)}
  const fresh=clone(DEFAULT_STATE);saveState(fresh);return fresh;
}
function saveState(state=STATE){state.version=13;state.updatedAt=isoNow();try{localStorage.setItem(STORE_KEY,JSON.stringify(state));setSyncStatus('Saved '+new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}));}catch(e){setSyncStatus('Storage full/error');console.warn(e)}}
function normaliseV13(state){const s=Object.assign(clone(DEFAULT_STATE),state||{});s.profile=Object.assign({},DEFAULT_STATE.profile,state.profile||{});s.settings=Object.assign({},DEFAULT_STATE.settings,state.settings||{});s.jobs=Array.isArray(s.jobs)?s.jobs.map(normaliseJob):[];s.contacts=Array.isArray(s.contacts)?s.contacts.map(normaliseContact):[];s.prep=Object.assign({},DEFAULT_STATE.prep,state.prep||{});s.prep.cvVariants=Array.isArray(s.prep.cvVariants)?s.prep.cvVariants:clone(DEFAULT_STATE.prep.cvVariants);s.prep.evidence=Array.isArray(s.prep.evidence)?s.prep.evidence:[];s.prep.starExamples=Array.isArray(s.prep.starExamples)?s.prep.starExamples:[];s.prep.templates=Array.isArray(s.prep.templates)?s.prep.templates:seedTemplates();return s}
function normaliseJob(j){return Object.assign({id:uid('job'),company:'',role:'',location:'',postcode:'',sector:'',summary:'',equipment:'',fit:'Medium',stage:'target',status:'',sourceUrl:'',salaryMin:null,salaryMax:null,salaryConfirmed:false,commuteMins:null,commuteChecked:'',drivingRequired:'unknown',travelPercent:'unknown',onCall:'unknown',workLife:'unknown',dateFound:isoNow(),dateApplied:'',lastContact:'',followUpDue:'',deadline:'',interviewDate:'',contactName:'',contactDetails:'',contactType:'',nextAction:'',mainRisk:'',notes:'',cvVariant:'',generated:[],closedReason:'',closedDate:''},j||{})}
function normaliseContact(c){return Object.assign({id:uid('contact'),name:'',company:'',type:'recruiter',bestChannel:'',details:'',email:'',phone:'',linkedJobIds:[],status:'live',lastContact:'',nextFollowUp:'',relationship:'',notes:'',timeline:[]},c||{})}
function migrateV12(old){
  const ns=clone(DEFAULT_STATE);
  ns.createdAt=old.createdAt||isoNow();
  ns.settings.originPostcode=old.settings?.originPostcode||'L35 7NH';
  ns.settings.maxCommute=Number(old.settings?.maxJourneyMinutes)||90;
  ns.settings.drivingAllowed=!!old.settings?.drivingAllowed;
  ns.settings.maxTravel=old.settings?.maxTravelPercent||'under25';
  const apps=Array.isArray(old.apps)?old.apps:[];
  ns.jobs=apps.map(a=>normaliseJob({

function scoreJob(job){
  const s=STATE.settings; const flags=[]; let score=50; let decision='Qualify first'; let colour='amber';
  const closed=job.stage==='closed'||job.closedDate||/closed|rejected|archive/i.test(job.status||'');
  if(closed) return {score:0,decision:'Archive',colour:'purple',flags:['Closed or archived'],risk:job.closedReason||'Closed or archived'};
  if(job.drivingRequired==='yes' && !s.drivingAllowed) return {score:5,decision:'Reject',colour:'red',flags:['Driving required'],risk:'Driving appears essential. This breaches the hard filter.'};
  if(job.drivingRequired==='no') score+=15; else {score-=10; flags.push('Driving unverified')}
  const fitMap={High:28,'Medium-High':20,Medium:10,'Low-Medium':0,Low:-12}; score+=fitMap[job.fit]??8;
  const cm=job.commuteMins===''||job.commuteMins==null?null:Number(job.commuteMins);
  if(cm===null||Number.isNaN(cm)){score-=5;flags.push('Commute not checked')} else if(cm<60){score+=12}else if(cm<=90){score+=5;flags.push('Commute amber')}else{score-=28;flags.push('Commute over 90 mins')}
  const sal=Number(job.salaryMin||job.salaryMax||0);
  if(job.salaryConfirmed && sal>=s.salaryMinimum){score+=10}else if(job.salaryConfirmed && sal && sal<s.salaryMinimum){score-=22;flags.push('Salary below minimum')}else{score-=10;flags.push('Salary unconfirmed')}
  if(job.travelPercent==='0')score+=8;else if(job.travelPercent==='under25')score+=2;else if(job.travelPercent==='unknown'){score-=5;flags.push('Travel unverified')}else{score-=18;flags.push('Travel too high')}
  if(job.onCall==='yes') {score-=3;flags.push('On-call')} if(job.workLife==='good')score+=5; if(job.workLife==='poor')score-=10;
  const due=daysUntil(job.followUpDue); if(due!==null&&due<0)flags.push('Follow-up overdue');
  score=Math.max(0,Math.min(100,Math.round(score)));
  if(job.stage==='interview'||job.interviewDate) {decision='Prepare interview'; colour='blue'}
  else if(due!==null && due<=0){decision='Follow up'; colour=due<0?'red':'amber'}
  else if(flags.some(f=>/unverified|unconfirmed|not checked/i.test(f))) {decision='Qualify first'; colour='amber'}
  else if(score>=78){decision='Apply now'; colour='green'}
  else if(job.stage==='warm'||job.stage==='watchlist'){decision='Keep warm'; colour='purple'}
  else if(score>=62){decision='Apply now'; colour='green'} else {decision='Qualify first'; colour='amber'}
  const risk = job.mainRisk || flags[0] || 'No major risk recorded';
  return {score,decision,colour,flags,risk};
}
function allJobScores(){return STATE.jobs.map(job=>({job,score:scoreJob(job)}))}
function urgentActions(){
  const actions=[];
  for(const job of STATE.jobs){
    const sc=scoreJob(job); if(['Archive','Reject'].includes(sc.decision)) continue;
    const due=daysUntil(job.followUpDue); const intDue=daysUntil(job.interviewDate); const dl=daysUntil(job.deadline);
    if(intDue!==null && intDue<=7) actions.push({type:'interview',priority:intDue<0?100:92-intDue,colour:'blue',title:'Prepare interview',text:`${job.company} — ${job.role}`,detail:job.nextAction||'Build quick sheet and detailed prep.',jobId:job.id,due:job.interviewDate});
    if(due!==null && due<=0) actions.push({type:'followup',priority:due<0?95+Math.min(10,-due):88,colour:due<0?'red':'amber',title:due<0?'Overdue follow-up':'Follow up today',text:`${job.company} — ${job.role}`,detail:job.nextAction||'Send a concise follow-up.',jobId:job.id,due:job.followUpDue});
    if(dl!==null && dl<=3) actions.push({type:'deadline',priority:dl<0?90:85-dl,colour:'red',title:'Application deadline',text:`${job.company} — ${job.role}`,detail:'Deadline close. Apply or archive.',jobId:job.id,due:job.deadline});
    if(sc.decision==='Qualify first' && STATE.jobs.length) actions.push({type:'qualify',priority:64,colour:'amber',title:'Qualify practical fit',text:`${job.company} — ${job.role}`,detail:sc.risk,jobId:job.id,due:job.followUpDue});
    if(sc.decision==='Apply now' && !job.dateApplied) actions.push({type:'apply',priority:70+sc.score/10,colour:'green',title:'Apply now',text:`${job.company} — ${job.role}`,detail:job.nextAction||'Prepare CV/cover letter and apply.',jobId:job.id,due:job.deadline||job.followUpDue});
  }
  for(const c of STATE.contacts){const nd=daysUntil(c.nextFollowUp);if(c.status!=='archived'&&nd!==null&&nd<=0)actions.push({type:'contact',priority:nd<0?86:76,colour:nd<0?'red':'amber',title:nd<0?'Contact overdue':'Contact due',text:`${c.name} — ${c.company}`,detail:'Chase or update contact timeline.',contactId:c.id,due:c.nextFollowUp});}
  return actions.sort((a,b)=>b.priority-a.priority);
}
function badgeCounts(){const acts=urgentActions();const overdue=acts.filter(a=>daysUntil(a.due)!==null&&daysUntil(a.due)<0).length;const cDue=STATE.contacts.filter(c=>c.status!=='archived'&&daysUntil(c.nextFollowUp)!==null&&daysUntil(c.nextFollowUp)<=0).length;setBadge('badgeToday',overdue||acts.length);setBadge('badgeContacts',cDue)}

function autoLinkContacts(state=STATE){
  const contacts=state.contacts||[];
  function findMatch(name,company,email){const key=normalise(name)+'|'+normalise(company);return contacts.find(c=>(email&&c.email&&normalise(c.email)===normalise(email))||(normalise(c.name)+'|'+normalise(c.company)===key))}
  for(const j of state.jobs||[]){
    if(!j.contactName && !j.contactDetails) continue;
    const email=extractEmail(j.contactDetails); const phone=extractPhone(j.contactDetails); const name=j.contactName||email||'Unknown contact';
    let c=findMatch(name,j.company,email);
    if(!c){c=normaliseContact({name,company:j.company,type:inferContactType(j),bestChannel:email?'email':phone?'phone':'unknown',details:j.contactDetails||'',email,phone,lastContact:j.lastContact||'',nextFollowUp:j.followUpDue||'',timeline:[]});contacts.push(c)}
    c.details=c.details||j.contactDetails||''; c.email=c.email||email; c.phone=c.phone||phone; c.bestChannel=c.bestChannel || (email ? 'email' : (phone ? 'phone' : 'unknown'));
    if(!c.linkedJobIds.includes(j.id)) c.linkedJobIds.push(j.id);
    if(j.lastContact && !c.timeline.some(t=>t.date===j.lastContact && t.text.includes(j.role))){c.timeline.push({date:j.lastContact,text:`Contact linked from ${j.role}`})}
    if(!c.nextFollowUp && j.followUpDue)c.nextFollowUp=j.followUpDue;
  }
  state.contacts=mergeContacts(contacts);
}
function mergeContacts(contacts){const out=[];for(const c0 of contacts.map(normaliseContact)){const email=normalise(c0.email||extractEmail(c0.details));const key=email||normalise(c0.name)+'|'+normalise(c0.company);let c=out.find(x=>(email&&normalise(x.email)===email)||(!email&&(normalise(x.name)+'|'+normalise(x.company)===key)));if(!c){c0.email=c0.email||extractEmail(c0.details);c0.phone=c0.phone||extractPhone(c0.details);out.push(c0);continue}c.details=[c.details,c0.details].filter(Boolean).filter((v,i,a)=>a.indexOf(v)===i).join('\n');c.linkedJobIds=Array.from(new Set([...(c.linkedJobIds||[]),...(c0.linkedJobIds||[])]));c.timeline=[...(c.timeline||[]),...(c0.timeline||[])];c.lastContact=c.lastContact||c0.lastContact;c.nextFollowUp=c.nextFollowUp||c0.nextFollowUp;c.bestChannel=c.bestChannel||c0.bestChannel;c.type=c.type||c0.type}return out}
function inferContactType(job){const d=(job.contactDetails+' '+job.contactName).toLowerCase();if(/talent|recruit|recruiter|hr/.test(d))return 'recruiter';if(/manager|lead|director|production/.test(d))return 'hiring manager';return 'company contact'}

window.openJob=function(id){currentView='jobs';render();setTimeout(()=>{const d=document.getElementById('job_'+id);if(d){d.open=true;d.scrollIntoView({block:'center',behavior:'smooth'})}},60)}

function renderContacts(){
  autoLinkContacts();saveState();const rows=STATE.contacts.filter(c=>{if(contactFilter==='all')return true;if(contactFilter==='hot')return c.status==='live'&&linkedJobs(c).some(j=>['interview','screening','offer'].includes(j.stage));if(contactFilter==='due')return daysUntil(c.nextFollowUp)!==null&&daysUntil(c.nextFollowUp)<=7&&c.status!=='archived';if(contactFilter==='recruiter')return /recruit/i.test(c.type);if(contactFilter==='hiring')return /manager|hiring|lead/i.test(c.type);if(contactFilter==='archived')return c.status==='archived';return true}).sort((a,b)=>(daysUntil(a.nextFollowUp)??999)-(daysUntil(b.nextFollowUp)??999));
  app.innerHTML=pageTitle('Contacts','Auto-linked')+`<div class="toolbar"><div class="pill-tabs">${[['all','All'],['hot','Hot'],['due','Need follow-up'],['recruiter','Recruiters'],['hiring','Hiring managers'],['archived','Archived']].map(([v,t])=>`<button class="${contactFilter===v?'active':''}" onclick="contactFilter='${v}';renderContacts()">${t}</button>`).join('')}</div><button class="btn primary" onclick="importPipelineContacts()">Import pipeline contacts</button><button class="btn" onclick="addContact()">+ Contact</button></div><div class="list">${rows.length?rows.map(contactCard).join(''):'<div class="empty">No contacts in this view.</div>'}</div>`;
}
function contactCard(c){const jobs=linkedJobs(c);return `<details class="contact-card" id="contact_${c.id}"><summary><div class="contact-head"><div><div class="title">${escapeHTML(c.name||'Unnamed contact')}</div><div class="sub">${escapeHTML(c.company||'No company')} · ${escapeHTML(c.type||'contact')}</div></div>${dueText(c.nextFollowUp)}</div><div class="row" style="margin-top:9px">${chip(c.status||'live',c.status==='archived'?'purple':'blue')}${c.bestChannel?chip(c.bestChannel,'green'):''}${jobs.length?chip(jobs.length+' linked job(s)','blue'):''}</div><div class="next">${escapeHTML(c.relationship||c.notes||'No relationship note yet.')}</div></summary><div class="detail-body">${contactDetailHTML(c,jobs)}</div></details>`}
function contactDetailHTML(c,jobs){return `<div class="section-title">Contact details</div><div class="form-grid two">${inputField('contact',c.id,'name','Name',c.name)}${inputField('contact',c.id,'company','Company',c.company)}${inputField('contact',c.id,'type','Type',c.type)}${inputField('contact',c.id,'bestChannel','Best channel',c.bestChannel)}${inputField('contact',c.id,'email','Email',c.email,'email')}${inputField('contact',c.id,'phone','Phone',c.phone)}${inputField('contact',c.id,'lastContact','Last contact',c.lastContact,'date')}${inputField('contact',c.id,'nextFollowUp','Next follow-up',c.nextFollowUp,'date')}${textareaField('contact',c.id,'details','Details',c.details,'full')}${textareaField('contact',c.id,'relationship','Relationship status',c.relationship,'full')}${textareaField('contact',c.id,'notes','Notes',c.notes,'full')}</div><div class="section-title">Linked jobs</div>${jobs.length?jobs.map(j=>`<div class="row" style="padding:7px 0"><span>${escapeHTML(j.company)} — ${escapeHTML(j.role)}</span><span class="spacer"></span><button class="btn small" onclick="openJob('${j.id}')">Open</button></div>`).join(''):'<div class="empty">No linked jobs.</div>'}<div class="section-title">Timeline</div><div class="timeline">${(c.timeline||[]).length?c.timeline.map(t=>`<div class="timeline-item"><b>${escapeHTML(t.date||'No date')}</b><br>${escapeHTML(t.text||'')}</div>`).join(''):'<div class="empty">No timeline yet.</div>'}</div><div class="toolbar" style="margin-top:10px"><button class="btn" onclick="addTimeline('${c.id}')">+ Timeline note</button><button class="btn danger" onclick="archiveContact('${c.id}')">Archive contact</button></div>`}
window.importPipelineContacts=function(){const before=STATE.contacts.length;autoLinkContacts();saveState();renderContacts();toast(`Imported/merged ${Math.max(0,STATE.contacts.length-before)} new contact(s)`) }
window.addContact=function(){const c=normaliseContact({name:'New contact',nextFollowUp:isoNow()});STATE.contacts.unshift(c);saveState();renderContacts();setTimeout(()=>{const d=document.getElementById('contact_'+c.id);if(d){d.open=true;d.scrollIntoView({block:'center'})}},50)}
window.addTimeline=function(id){const c=STATE.contacts.find(x=>x.id===id);if(!c)return;const text=prompt('Timeline note');if(!text)return;c.timeline=c.timeline||[];c.timeline.unshift({date:isoNow(),text});c.lastContact=isoNow();saveState();renderContacts();toast('Timeline added')}
window.archiveContact=function(id){const c=STATE.contacts.find(x=>x.id===id);if(!c)return;c.status='archived';saveState();renderContacts();toast('Contact archived')}
window.openContact=function(id){currentView='contacts';render();setTimeout(()=>{const d=document.getElementById('contact_'+id);if(d){d.open=true;d.scrollIntoView({block:'center',behavior:'smooth'})}},60)}

function renderPrep(){
  const jobOptions=STATE.jobs.map(j=>`<option value="${j.id}">${escapeHTML(j.company)} — ${escapeHTML(j.role)}</option>`).join('');
  app.innerHTML=pageTitle('Prep','Generate and store')+`<div class="card"><h2>Generator</h2><div class="form-grid two"><div class="field"><label>Job</label><select id="genJob"><option value="">Choose a job</option>${jobOptions}</select></div><div class="field"><label>Output type</label><select id="genType"><option value="followup">Recruiter follow-up email</option><option value="application">Application email</option><option value="cover">Cover letter</option><option value="linkedin">LinkedIn message</option><option value="interview">Interview prep sheet</option><option value="starpack">STAR answer pack</option><option value="salary">Salary clarification email</option><option value="travel">Driving/travel clarification email</option></select></div></div><div class="split-actions"><button class="btn primary" onclick="generatePrep()">Generate</button><button class="btn" onclick="copyPrep()">Copy output</button></div><div class="generated" id="prepOut" style="margin-top:10px">${escapeHTML(prepOutput||'Choose a job and output type, then generate.')}</div></div>
  <div class="desktop-2"><div class="card"><h2>CV variants</h2><div class="list">${STATE.prep.cvVariants.map(cv=>`<div class="action-card"><div class="priority-dot blue"></div><div><b>${escapeHTML(cv.name)}</b><div class="sub">${escapeHTML(cv.file||'No file mapped')}</div><div class="next">${escapeHTML(cv.notes||'')}</div></div></div>`).join('')||'<div class="empty">No CV variants.</div>'}</div><button class="btn small" style="margin-top:10px" onclick="addCvVariant()">+ CV variant</button></div>
  <div class="card"><h2>Evidence bullets</h2><div class="list">${STATE.prep.evidence.map(e=>`<div class="action-card"><div class="priority-dot green"></div><div><b>${escapeHTML(e.tag||'Evidence')}</b><div class="next">${escapeHTML(e.text||'')}</div></div></div>`).join('')||'<div class="empty">No evidence bullets yet.</div>'}</div><button class="btn small" style="margin-top:10px" onclick="addEvidence()">+ Evidence</button></div></div>
  <div class="card"><h2>STAR bank</h2><div class="list">${STATE.prep.starExamples.map(s=>`<details><summary class="action-card"><div class="priority-dot purple"></div><div><b>${escapeHTML(s.title||'STAR example')}</b><div class="sub">${escapeHTML(s.tags||'')}</div></div></summary><div class="detail-body"><pre class="generated">${escapeHTML(s.body||'')}</pre></div></details>`).join('')||'<div class="empty">No STAR examples yet.</div>'}</div><button class="btn small" style="margin-top:10px" onclick="addStar()">+ STAR</button></div>`;
}
function fillTemplate(text,job){const c=STATE.contacts.find(x=>(x.linkedJobIds||[]).includes(job.id))||{};return String(text||'').replaceAll('{contactName}',c.name||job.contactName||'there').replaceAll('{company}',job.company||'the company').replaceAll('{role}',job.role||'the role').replaceAll('{profileName}',STATE.profile.name||'Michael').replaceAll('{location}',job.location||'the site')}
function generateText(job,type){const name=STATE.profile.name||'Michael';const contact=STATE.contacts.find(c=>(c.linkedJobIds||[]).includes(job.id))||{};const contactName=contact.name||job.contactName||'there';const fitLine=`My background is in safety-critical engineering, regulated diagnostic equipment support, fault-finding, RCA, preventative maintenance and customer-facing technical recovery.`;const risks=[scoreJob(job).risk, job.drivingRequired==='unknown'?'driving requirement':null, !job.salaryConfirmed?'salary range':null, job.travelPercent==='unknown'?'travel pattern':null].filter(Boolean).join('; ');
  if(type==='followup')return `Subject: Following up — ${job.role} at ${job.company}\n\nHi ${contactName},\n\nI am checking in on the ${job.role} role at ${job.company}.\n\nCould you confirm whether the role is still live and advise on the salary range, site location, shift pattern, and whether any regular driving or travel is essential?\n\nBest,\n${name}`;
  if(type==='application')return `Subject: Application — ${job.role}\n\nHi ${contactName},\n\nPlease find attached my CV for the ${job.role} role at ${job.company}.\n\n${fitLine}\n\nThe role interests me because it appears to match my fixed-site engineering, automation, diagnostics and reliability background.\n\nBest,\n${name}`;
  if(type==='cover')return `Dear Hiring Manager,\n\nI am applying for the ${job.role} role at ${job.company}.\n\n${fitLine}\n\nI can offer practical electro-mechanical fault-finding, disciplined maintenance practice, regulated documentation, and calm recovery of technical systems under pressure. My experience transfers directly to roles involving ${job.equipment||'complex technical equipment'} in a fixed-site or depot environment.\n\nThe points I would want to clarify early are: ${risks||'salary, site pattern and travel expectations'}.\n\nYours faithfully,\n${name}`;
  if(type==='linkedin')return `Hi ${contactName}, I am interested in the ${job.role} role at ${job.company}. My background is in safety-critical engineering and regulated diagnostic equipment support, including fault-finding, RCA and preventative maintenance. Could you confirm who is best to speak to about the vacancy? Thanks, ${name}`;
  if(type==='salary')return `Hi ${contactName},\n\nBefore progressing further with the ${job.role} role, could I confirm the salary range and whether the figure is fixed or dependent on shift/on-call allowances?\n\nI am trying to check practical fit before wasting your time or mine.\n\nBest,\n${name}`;
  if(type==='travel')return `Hi ${contactName},\n\nCould I confirm whether the ${job.role} role is fixed-site at ${job.location||'the advertised location'}, or whether regular driving, territory travel, or multi-site cover is essential?\n\nThat practical point is important before progressing.\n\nBest,\n${name}`;
  if(type==='starpack')return buildStarPack(job);
  return buildInterviewPrep(job);
}
function buildInterviewPrep(job){const sc=scoreJob(job);return `INTERVIEW PREP — ${job.company}\nRole: ${job.role}\nLocation: ${job.location||'Not confirmed'}\nDecision: ${sc.decision} (${sc.score}/100)\n\n1. Company / role summary\n${job.summary||'Research company, site, product line and engineering function before interview.'}\n\n2. Why I fit\n- Safety-critical Royal Navy engineering background.\n- Regulated medical diagnostic equipment experience.\n- Electro-mechanical RCA, PPM, breakdown recovery and documentation.\n- Transferable fixed-site/depot reliability mindset.\n\n3. Main risks to handle\n- ${sc.flags.join('\n- ') || sc.risk}\n\n4. Likely questions\n- Talk me through a difficult fault you diagnosed.\n- How do you prioritise breakdowns and planned maintenance?\n- What regulated/safety-critical documentation have you worked with?\n- Why this role and why now?\n- Are there any practical constraints around travel, shifts or site cover?\n\n5. Questions for them\n- What systems/assets will I work on day to day?\n- What does success look like in the first 3 months?\n- What is the shift/on-call pattern?\n- Is regular driving or multi-site cover required?\n- What is the salary range and progression path?\n\n6. STAR examples to use\n${STATE.prep.starExamples.slice(0,3).map(s=>'- '+s.title).join('\n') || '- Add STAR examples in Prep.'}`}
function buildStarPack(job){return `STAR ANSWER PACK — ${job.company} / ${job.role}\n\nUse these examples and adapt out loud:\n\n${STATE.prep.starExamples.length?STATE.prep.starExamples.map(s=>`${s.title}\nTags: ${s.tags}\n${s.body}`).join('\n\n---\n\n'):'No STAR examples stored yet. Add Abbott recovery, Sysmex fault, and Royal Navy safety-critical maintenance examples.'}`}
window.generatePrep=function(){const job=STATE.jobs.find(j=>j.id===document.getElementById('genJob').value);const type=document.getElementById('genType').value;if(!job){toast('Choose a job first');return}prepOutput=generateText(job,type);document.getElementById('prepOut').textContent=prepOutput;}
window.copyPrep=function(){navigator.clipboard?.writeText(prepOutput||document.getElementById('prepOut')?.textContent||'').then(()=>toast('Copied'))}
window.quickGenerateForJob=function(id,type){const job=STATE.jobs.find(j=>j.id===id);if(!job)return;prepOutput=generateText(job,type);currentView='prep';render();}
window.addCvVariant=function(){const name=prompt('CV variant name');if(!name)return;STATE.prep.cvVariants.push({id:uid('cv'),name,file:'',notes:''});saveState();renderPrep()}
window.addEvidence=function(){const tag=prompt('Tag, e.g. RCA');if(!tag)return;const text=prompt('Evidence bullet');if(!text)return;STATE.prep.evidence.push({id:uid('ev'),tag,text});saveState();renderPrep()}
window.addStar=function(){const title=prompt('STAR title');if(!title)return;STATE.prep.starExamples.push({id:uid('star'),title,tags:'',body:'Situation:\nTask:\nAction:\nResult:'});saveState();renderPrep()}

function renderMore(){app.innerHTML=pageTitle('More','Settings and backup')+`<div class="danger-note"><b>Privacy rule:</b> keep private job/contact data in your browser or iCloud backup. Do not upload snapshot JSON files to a public GitHub repository.</div><div class="desktop-grid"><div><div class="card"><h2>Profile</h2><div class="form-grid two">${profileField('name','Name',STATE.profile.name)}${profileField('email','Email',STATE.profile.email,'email')}${profileField('phone','Phone',STATE.profile.phone)}${profileField('location','Location',STATE.profile.location)}</div></div><div class="card"><h2>Settings</h2><div class="form-grid two">${settingField('originPostcode','Origin postcode',STATE.settings.originPostcode)}${settingField('maxCommute','Max commute mins',STATE.settings.maxCommute,'number')}${settingField('salaryMinimum','Minimum salary',STATE.settings.salaryMinimum,'number')}${settingField('preferredSalary','Preferred salary',STATE.settings.preferredSalary,'number')}</div></div></div><div><div class="card"><h2>Backup and restore</h2><div class="list"><button class="btn primary" onclick="backupData()">Backup my data</button><button class="btn" onclick="document.getElementById('restoreFile').click()">Restore from backup</button><button class="btn" onclick="exportForChatGPT()">Export for ChatGPT review</button><button class="btn" onclick="exportCalendar()">Export calendar reminders (.ics)</button><button class="btn" onclick="refreshApp()">Refresh app cache</button><input id="restoreFile" type="file" accept=".json,.txt" class="hidden" onchange="restoreFile(this.files[0])"></div></div><div class="card"><h2>App status</h2><div class="list"><div class="action-card"><div class="priority-dot blue"></div><div><b>Version</b><div class="sub">CareerConsole v${APP_VERSION}</div></div></div><div class="action-card"><div class="priority-dot green"></div><div><b>Data</b><div class="sub">${STATE.jobs.length} jobs · ${STATE.contacts.length} contacts · ${STATE.prep.starExamples.length} STAR examples</div></div></div></div></div></div></div>`}
function profileField(key,label,value,type='text'){return `<div class="field"><label>${label}</label><input type="${type}" value="${escapeHTML(value||'')}" onchange="STATE.profile['${key}']=this.value;saveState()"></div>`}
function settingField(key,label,value,type='text'){return `<div class="field"><label>${label}</label><input type="${type}" value="${escapeHTML(value??'')}" onchange="STATE.settings['${key}']='${type}'==='number'?Number(this.value):this.value;saveState()"></div>`}
window.backupData=function(){autoLinkContacts();saveState();downloadFile(`careerconsole_v13_backup_${isoNow()}.json`,JSON.stringify(STATE,null,2));toast('Backup downloaded')}
window.restoreFile=function(file){if(!file)return;const r=new FileReader();r.onload=()=>{try{importAnyState(JSON.parse(r.result))}catch(e){alert('Restore failed: '+e.message)}};r.readAsText(file)}
window.exportForChatGPT=function(){const review={version:STATE.version,exportedAt:new Date().toISOString(),profile:{name:STATE.profile.name||'',location:STATE.profile.location||''},settings:STATE.settings,jobs:STATE.jobs,contacts:STATE.contacts,prep:STATE.prep};downloadFile(`careerconsole_for_chatgpt_${isoNow()}.json`,JSON.stringify(review,null,2));}
window.exportCalendar=function(){const lines=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//CareerConsole//v13//EN','CALSCALE:GREGORIAN'];function addEvent(date,title,desc){if(!date)return;const dt=String(date).replaceAll('-','');lines.push('BEGIN:VEVENT','UID:'+uid('cc')+'@careerconsole','DTSTAMP:'+new Date().toISOString().replace(/[-:]/g,'').split('.')[0]+'Z','DTSTART;VALUE=DATE:'+dt,'SUMMARY:'+ics(title),'DESCRIPTION:'+ics(desc),'END:VEVENT')}STATE.jobs.forEach(j=>{addEvent(j.followUpDue,'CareerConsole: Follow up '+j.company,j.role+' — '+(j.nextAction||''));addEvent(j.interviewDate,'CareerConsole: Interview prep '+j.company,j.role);addEvent(j.deadline,'CareerConsole: Deadline '+j.company,j.role)});STATE.contacts.forEach(c=>addEvent(c.nextFollowUp,'CareerConsole: Contact '+c.name,c.company+' — '+(c.notes||'')));lines.push('END:VCALENDAR');downloadFile(`careerconsole_reminders_${isoNow()}.ics`,lines.join('\r\n'),'text/calendar');toast('Calendar exported')}
function ics(s){return String(s||'').replace(/[\\,;]/g,'\\$&').replace(/\n/g,'\\n')}
function serviceWorkerAllowed(){return location.protocol==='https:'||location.hostname==='localhost'||location.hostname==='127.0.0.1'}
window.refreshApp=async function(){try{if('caches'in window){const keys=await caches.keys();await Promise.all(keys.map(k=>caches.delete(k)))}if(serviceWorkerAllowed()&&'serviceWorker'in navigator){const regs=await navigator.serviceWorker.getRegistrations();for(const r of regs)await r.update()}toast('Cache refreshed. Reloading.');setTimeout(()=>location.reload(),700)}catch(e){alert('Refresh failed: '+e.message)}}

function generateWeeklyReview(){const acts=urgentActions().slice(0,12);const best=allJobScores().filter(x=>!['Archive','Reject'].includes(x.score.decision)).sort((a,b)=>b.score.score-a.score.score).slice(0,8);const archive=allJobScores().filter(x=>x.score.score<35&&!['Archive','Reject'].includes(x.score.decision)).slice(0,6);const lines=[];lines.push('CAREERCONSOLE WEEKLY REVIEW');lines.push('Generated: '+new Date().toLocaleString());lines.push('');lines.push('1. Priority actions');acts.forEach((a,i)=>lines.push(`${i+1}. ${a.title}: ${a.text} — ${a.detail}`));if(!acts.length)lines.push('No urgent actions.');lines.push('');lines.push('2. Best opportunities');best.forEach((x,i)=>lines.push(`${i+1}. ${x.job.company} — ${x.job.role} (${x.score.score}/100, ${x.score.decision})`));lines.push('');lines.push('3. Contacts to chase');STATE.contacts.filter(c=>c.status!=='archived'&&daysUntil(c.nextFollowUp)!==null&&daysUntil(c.nextFollowUp)<=7).forEach(c=>lines.push(`- ${c.name} / ${c.company}: due ${c.nextFollowUp}`));lines.push('');lines.push('4. Jobs to archive or de-prioritise');archive.forEach(x=>lines.push(`- ${x.job.company} — ${x.job.role}: ${x.score.risk}`));lines.push('');lines.push('5. Prep tasks');STATE.jobs.filter(j=>j.stage==='interview'||j.interviewDate).forEach(j=>lines.push(`- Build interview prep for ${j.company} — ${j.role}`));const out=document.getElementById('weeklyOut');out.style.display='block';out.textContent=lines.join('\n')}

function showModal(title,html){let old=document.getElementById('modalBackdrop');if(old)old.remove();const d=document.createElement('div');d.className='modal-backdrop';d.id='modalBackdrop';d.innerHTML=`<div class="modal"><div class="row"><h3 style="margin:0;font-size:20px">${escapeHTML(title)}</h3><span class="spacer"></span><button class="btn small" onclick="closeModal()">Close</button></div><div style="margin-top:12px">${html}</div></div>`;d.addEventListener('click',e=>{if(e.target===d)closeModal()});document.body.appendChild(d)}
window.closeModal=function(){document.getElementById('modalBackdrop')?.remove()}

if(serviceWorkerAllowed()&&'serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(console.warn));}
render();
</script>
