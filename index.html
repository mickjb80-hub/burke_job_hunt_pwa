<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="CareerConsole" />
<meta name="theme-color" content="#0b0d10" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icons/icon-180.png" />
<title>CareerConsole v14.2</title>
<style>
:root{
  --bg:#0b0d10; --bg2:#111418; --card:#161a20; --card2:#1c2128;
  --line:#252b34; --line2:#2f3742;
  --txt:#e9edf2; --txt2:#aeb6c0; --txt3:#7b8694;
  --blue:#0a84ff; --blue-dim:#0a84ff22; --blue-line:#0a84ff55;
  --green:#30d158; --amber:#ffd60a; --red:#ff453a; --red-dim:#ff453a1f;
  --radius:14px; --radius-sm:10px;
  --font:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",Arial,sans-serif;
  --nav-h:76px; --safe-b:env(safe-area-inset-bottom,0px); --safe-t:env(safe-area-inset-top,0px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);font-family:var(--font);
  font-size:17px;line-height:1.5;-webkit-font-smoothing:antialiased}
body{padding-bottom:calc(var(--nav-h) + var(--safe-b))}
body.nochrome{padding-bottom:0}
a{color:var(--blue);text-decoration:none}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:17px}
.hidden{display:none !important}

header{position:sticky;top:0;z-index:40;background:rgba(11,13,16,.86);
  backdrop-filter:saturate(160%) blur(14px);-webkit-backdrop-filter:saturate(160%) blur(14px);
  border-bottom:1px solid var(--line);padding:calc(var(--safe-t) + 12px) 16px 12px}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:10px}
.brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:20px;letter-spacing:.1px}
.brand .logo{width:26px;height:26px;border-radius:7px;display:block}
.profchip{display:flex;align-items:center;gap:7px;font-size:14px;font-weight:700;color:var(--txt2);
  background:var(--card);border:1px solid var(--line);padding:5px 10px;border-radius:20px;max-width:46vw}
.profchip .nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ver{font-size:13px;color:var(--txt3);font-weight:700;background:var(--card);
  border:1px solid var(--line);padding:2px 7px;border-radius:20px}
.updatebar{margin-top:8px;background:var(--blue-dim);border:1px solid var(--blue-line);
  border-radius:var(--radius-sm);padding:8px 11px;font-size:13px;display:flex;
  align-items:center;justify-content:space-between;gap:10px}
.updatebar button{background:var(--blue);color:#fff;border:none;border-radius:8px;padding:6px 12px;font-weight:600;font-size:13px}

main{max-width:1180px;margin:0 auto;padding:16px 16px 30px}
@media(min-width:900px){ main{padding:24px 28px 40px} }
h1{font-size:32px;font-weight:850;letter-spacing:-.5px;margin:8px 0 6px}
h2.sec{font-size:15px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;
  color:var(--txt3);margin:26px 0 10px;display:flex;align-items:center;gap:8px}
.subtle{color:var(--txt2);font-size:16px;margin:3px 0 0}

.card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:18px;margin-bottom:14px}
.card.tap{cursor:pointer;transition:border-color .12s,background .12s}
.card.tap:active{background:var(--card2)}
.row{display:flex;align-items:center;gap:10px}
.row.between{justify-content:space-between}
.row.wrap{flex-wrap:wrap}
.spacer{flex:1}
.muted{color:var(--txt2);font-size:16px}
.tiny{color:var(--txt3);font-size:14px;line-height:1.45}
.kv{display:flex;gap:8px;font-size:15px;color:var(--txt2);line-height:1.45}
.kv b{color:var(--txt);font-weight:600}
.grid{display:grid;gap:10px}
@media(min-width:760px){ .grid.cols-2{grid-template-columns:1fr 1fr} .grid.cols-3{grid-template-columns:1fr 1fr 1fr} }

.pill{display:inline-flex;align-items:center;gap:6px;font-size:14px;font-weight:700;
  padding:3px 9px;border-radius:20px;background:var(--card2);border:1px solid var(--line2);color:var(--txt2);white-space:nowrap}
.pill.blue{background:var(--blue-dim);border-color:var(--blue-line);color:#5cb1ff}
.pill.green{background:#30d15822;border-color:#30d15855;color:#5fe487}
.pill.amber{background:#ffd60a1c;border-color:#ffd60a55;color:#ffdf4a}
.pill.red{background:var(--red-dim);border-color:#ff453a66;color:#ff7a72}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.dot.green{background:var(--green)} .dot.amber{background:var(--amber)} .dot.red{background:var(--red)} .dot.grey{background:var(--txt3)}
.score{font-weight:850;font-size:23px;font-variant-numeric:tabular-nums}
.score small{font-size:13px;color:var(--txt3);font-weight:700}
.score.good{color:var(--green)} .score.warn{color:var(--amber)} .score.poor{color:var(--txt3)}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;border-radius:14px;
  padding:13px 17px;min-height:48px;font-weight:750;font-size:16.5px;border:1px solid var(--line2);background:var(--card2);color:var(--txt)}
.btn:active{transform:translateY(1px)}
.btn.primary{background:var(--blue);border-color:var(--blue);color:#fff}
.btn.ghost{background:transparent}
.btn.danger{background:transparent;border-color:#ff453a66;color:#ff7a72}
.btn.sm{padding:10px 14px;min-height:44px;font-size:15px;border-radius:13px}
.btn.full{width:100%}
.btn.big{padding:18px;font-size:18px;border-radius:18px;min-height:58px}
.btnrow{display:flex;gap:10px;flex-wrap:wrap}

.chips{display:flex;gap:10px;overflow-x:auto;padding:6px 0 12px;-webkit-overflow-scrolling:touch}
.chips::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;font-size:15.5px;font-weight:750;padding:11px 16px;min-height:46px;border-radius:24px;background:var(--card);border:1px solid var(--line);color:var(--txt2)}
.chip.on{background:var(--blue);border-color:var(--blue);color:#fff}

label.f{display:block;font-size:14px;font-weight:800;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px;margin:16px 0 7px}
label.f .opt{color:var(--txt3);text-transform:none;letter-spacing:0;font-weight:500}
label.f .req{color:#ff7a72}
input.in,select.in,textarea.in{width:100%;background:var(--bg2);border:1px solid var(--line2);color:var(--txt);border-radius:10px;padding:11px 12px;outline:none}
input.in:focus,select.in:focus,textarea.in:focus{border-color:var(--blue-line)}
textarea.in{resize:vertical;min-height:90px;line-height:1.5}
.field2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

.act{display:flex;gap:13px;align-items:flex-start;padding:16px 0;border-bottom:1px solid var(--line)}
.act:last-child{border-bottom:none}
.act .num{flex:0 0 32px;height:32px;border-radius:50%;background:var(--blue-dim);border:1px solid var(--blue-line);color:#5cb1ff;font-weight:800;font-size:15px;display:flex;align-items:center;justify-content:center}
.act .body{flex:1;min-width:0}
.act .title{font-weight:750;font-size:17px}
.act .why{font-size:15px;color:var(--txt2);margin-top:4px;line-height:1.45}

nav.tab{position:fixed;left:0;right:0;bottom:0;z-index:50;height:calc(var(--nav-h) + var(--safe-b));
  padding-bottom:var(--safe-b);background:rgba(13,16,20,.92);
  backdrop-filter:saturate(160%) blur(16px);-webkit-backdrop-filter:saturate(160%) blur(16px);
  border-top:1px solid var(--line);display:flex}
nav.tab button{flex:1;background:none;border:none;color:var(--txt3);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;font-size:13px;font-weight:750;padding-top:8px;position:relative;min-height:64px}
nav.tab button.on{color:var(--blue)}
nav.tab svg{width:23px;height:23px}
nav.tab .badge{position:absolute;top:3px;left:50%;margin-left:5px;background:var(--red);color:#fff;font-size:10px;font-weight:700;min-width:16px;height:16px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px}

.sheet-wrap{position:fixed;inset:0;z-index:80;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;justify-content:center}
@media(min-width:760px){ .sheet-wrap{align-items:center} }
.sheet{background:var(--bg2);border:1px solid var(--line2);border-radius:18px 18px 0 0;width:100%;max-width:640px;max-height:90vh;overflow:auto;padding:18px 16px calc(24px + var(--safe-b))}
@media(min-width:760px){ .sheet{border-radius:18px;max-height:86vh} }
.sheet h3{margin:4px 0 6px;font-size:25px;font-weight:850}
.sheet .grab{width:38px;height:4px;background:var(--line2);border-radius:3px;margin:0 auto 12px}
.closex{background:var(--card2);border:1px solid var(--line2);color:var(--txt2);width:44px;height:44px;border-radius:50%;font-size:22px;line-height:1}

#toast{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(var(--nav-h) + 18px + var(--safe-b));background:#23282f;border:1px solid var(--line2);color:var(--txt);padding:14px 18px;border-radius:16px;font-size:16px;z-index:120;opacity:0;transition:opacity .2s;pointer-events:none;max-width:92vw}
#toast.show{opacity:1;pointer-events:auto}
#toast .undoBtn{margin-left:12px;border:0;background:transparent;color:#7dd3fc;font-weight:800;font-size:16px}

.empty{text-align:center;color:var(--txt3);font-size:16px;padding:36px 12px}
.divider{height:1px;background:var(--line);margin:14px 0}
.reasons{font-size:14.5px;color:var(--txt2);margin-top:8px;line-height:1.65}
.reasons span{display:inline-block;margin-right:10px}
.warnbox{background:var(--red-dim);border:1px solid #ff453a55;border-radius:14px;padding:14px 15px;font-size:15.5px;color:#ff9b95;margin:10px 0}
.searchbar{margin:10px 0 14px;font-size:17px;min-height:48px}
input[type="search"]::-webkit-search-cancel-button{-webkit-appearance:none}
.okbox{background:#30d15814;border:1px solid #30d15844;border-radius:14px;padding:14px 15px;font-size:15.5px;color:#7fe79c;margin:10px 0}
.gen-out{white-space:pre-wrap}

/* Welcome */
.welcome{min-height:100vh;display:flex;flex-direction:column;justify-content:center;
  max-width:520px;margin:0 auto;padding:40px 22px calc(40px + var(--safe-b))}
.welcome .hero{text-align:center;margin-bottom:30px}
.welcome .hero img{width:84px;height:84px;border-radius:20px;margin-bottom:16px}
.welcome h1{font-size:36px;margin-bottom:8px}
.welcome p{color:var(--txt2);font-size:17px;margin:0}
.welcome .opt{display:flex;align-items:center;gap:14px;text-align:left;margin-bottom:12px}
.welcome .opt .ic{flex:0 0 44px;height:44px;border-radius:12px;background:var(--blue-dim);border:1px solid var(--blue-line);display:flex;align-items:center;justify-content:center;font-size:20px}
.welcome .opt .t{font-weight:800;font-size:18px}
.welcome .opt .d{font-size:15px;color:var(--txt2);line-height:1.45}
@media (max-width: 520px){
  main{padding-left:16px;padding-right:16px}
  .row.between{align-items:flex-start;gap:12px}
  .row.between h1{flex:1 1 100%}
  .row.between .btnrow{width:100%}
  .row.between .btnrow .btn{flex:1}
  .card.tap{padding:20px 18px}
  .card.tap > .row{gap:14px}
  .card.tap .score{align-self:flex-start}
  .sheet{max-height:92vh;border-top-left-radius:26px;border-top-right-radius:26px;padding:20px 18px calc(20px + var(--safe-b))}
  .sheet .btn.full{min-height:54px}
  .quickgrid,.grid{grid-template-columns:1fr!important}
  input,select,textarea{min-height:48px;border-radius:14px}
  textarea{min-height:118px}
}

/* Motion and polish */
@keyframes ccFadeIn{from{opacity:0}to{opacity:1}}
@keyframes ccSheetUp{from{transform:translateY(22px);opacity:.92}to{transform:translateY(0);opacity:1}}
@keyframes ccViewIn{from{opacity:.72;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.sheet-wrap{animation:ccFadeIn .18s ease-out}
.sheet{animation:ccSheetUp .20s cubic-bezier(.2,.8,.2,1);will-change:transform}
main.view-enter{animation:ccViewIn .18s ease-out}
.btn,.chip,.card.tap{transition:transform .12s ease,background .16s ease,border-color .16s ease,opacity .16s ease}
.btn:active,.chip:active,.card.tap:active{transform:scale(.985)}
.sheet.dragging{transition:none!important}
@media (prefers-reduced-motion: reduce){*,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important;scroll-behavior:auto!important}}
@media (prefers-color-scheme: light){
  :root{
    --bg:#f6f7f9; --bg2:#ffffff; --card:#ffffff; --card2:#eef1f5;
    --line:#d8dde5; --line2:#c8d0da;
    --txt:#111827; --txt2:#4b5563; --txt3:#6b7280;
    --blue:#007aff; --blue-dim:#007aff14; --blue-line:#007aff44;
    --green:#0a8f3c; --amber:#b77900; --red:#d92d20; --red-dim:#d92d2014;
  }
  header{background:rgba(246,247,249,.88)}
  nav.tab{background:rgba(255,255,255,.92)}
  #toast{background:#ffffff;color:var(--txt);box-shadow:0 10px 28px rgba(16,24,40,.16)}
  .sheet-wrap{background:rgba(15,23,42,.28)}
  .pill.blue{color:#005bbf}.pill.green{color:#087b34}.pill.amber{color:#9a6700}.pill.red{color:#b42318}
}

</style>
</head>
<body>
<header id="appHeader">
  <div class="topbar">
    <div class="brand">
      <img class="logo" src="icons/icon-192.png" alt="" onerror="this.style.display='none'"/>
      CareerConsole
    </div>
    <div class="row" style="gap:8px">
      <button class="profchip" id="profSwitch" onclick="openProfiles()">
        <span class="dot green"></span><span class="nm" id="profName">—</span> ▾
      </button>
      <span class="ver" id="buildVer">v13</span>
    </div>
  </div>
  <div id="updateBar" class="updatebar hidden">
    <span>New version ready.</span>
    <button onclick="applyUpdate()">Reload</button>
  </div>
</header>

<main id="view"></main>

<nav class="tab" id="navbar"></nav>
<div id="toast"></div>
<div id="modalRoot"></div>

<script>
"use strict";
/* ============================================================
   CareerConsole v14.2 — privacy split + weekly activity summaries
   ============================================================ */
const BUILD = "v14.2.0";
const ROOT_KEY = "careerconsole_root_v13";
const LEGACY_KEY = "careerconsole_v13";   // v13.0 single-workspace store
const SCHEMA = 13;

/* ---------- utilities ---------- */
const $ = (s,r=document)=>r.querySelector(s);
const uid = ()=> "id_"+Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const esc = s => (s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const todayISO = ()=> new Date().toISOString().slice(0,10);
function daysBetween(a,b){ return Math.round((new Date(a)-new Date(b))/86400000); }
function fmtDate(d){ if(!d) return "—"; const x=new Date(d+"T00:00:00"); if(isNaN(x)) return d;
  return x.toLocaleDateString("en-GB",{day:"numeric",month:"short"}); }
function toast(m){ const t=$("#toast"); t.textContent=m; t.classList.add("show"); clearTimeout(t._t);
  t._t=setTimeout(()=>t.classList.remove("show"),2400); }
let undoBuffer=null;
function toastUndo(m,fn){ const t=$("#toast"); t.innerHTML=`${esc(m)} <button class="undoBtn" onclick="runUndo()">Undo</button>`; undoBuffer=fn; t.classList.add("show"); clearTimeout(t._t); t._t=setTimeout(()=>{t.classList.remove("show"); undoBuffer=null;},10000); }
function runUndo(){ if(!undoBuffer)return; const fn=undoBuffer; undoBuffer=null; const t=$("#toast"); t.classList.remove("show"); fn(); }
function money(n){ if(n==null||n==="") return "—"; const v=Number(n); return isNaN(v)?String(n):"£"+v.toLocaleString("en-GB"); }
function lines(s){ return (s||"").split(/\n|,/).map(x=>x.trim()).filter(Boolean); }

function addDaysISO(d,n){ const x=new Date((d||todayISO())+"T00:00:00"); if(isNaN(x)) return ""; x.setDate(x.getDate()+n); return x.toISOString().slice(0,10); }
function defaultNextTouch(status,base=todayISO()){
  if(status==="Planned"||status==="To contact") return base;
  if(status==="Sent / awaiting reply") return addDaysISO(base,5);
  if(status==="Replied / live"||status==="Active conversation") return addDaysISO(base,3);
  if(status==="Interview / process") return addDaysISO(base,2);
  if(status==="Dormant") return addDaysISO(base,30);
  return "";
}
function isContactOverdue(c){ return !!(c.nextTouchDate && !["Dead / archive","Closed / not useful","Archived"].includes(c.status) && daysBetween(todayISO(),c.nextTouchDate)>0); }
function isContactDueToday(c){ return !!(c.nextTouchDate && daysBetween(todayISO(),c.nextTouchDate)===0); }
function contactActionUrl(kind,val){ if(!val) return "#"; if(kind==="email") return "mailto:"+encodeURIComponent(val); if(kind==="phone") return "tel:"+String(val).replace(/\s+/g,""); return val.startsWith("http")?val:"https://"+val; }


const DECISIONS = ["Apply now","Qualify first","Follow up","Prepare interview","Keep warm","Archive","Reject"];
const STAGES = ["Target","Applied","Screening","Interview","Offer","Warm lead","Watchlist","Closed"];
const WORKPREFS = ["Fixed-site / onsite","Hybrid","Remote","No preference"];
const TONES = ["Direct","Warm","Formal"];
const PRIORITIES = ["High","Medium","Low"];

/* ============================================================
   DATA MODEL
   root = { appVersion, activeProfileId, profiles:[ profile ] }
   profile = { id, meta, jobs, contacts, cvVariants, coverLetters,
               starBank, evidence, templates, adminNotes }
   meta drives scoring + generators.
   ============================================================ */
function defaultMeta(name){
  return { name:name||"", postcode:"", location:"",
    targetRoles:"", sectors:"",
    salaryMin:35000, salaryPref:"",
    commuteMax:90, drivingAvailable:false, travelMax:25,
    workPref:"Fixed-site / onsite",
    keySkills:"", keyExperience:"", qualifications:"",
    restrictions:"", tone:"Direct", disclosureNotes:"",
    staleThresholdDays:10, weeklySummaryStyle:"Personal review", nearbyTowns:"" };
}
function blankProfile(name){
  return { id:uid(), meta:defaultMeta(name||"My profile"),
    jobs:[], contacts:[], cvVariants:[], coverLetters:[],
    starBank:[], evidence:[], templates:[], adminNotes:[] };
}
function defaultRoot(){ return { appVersion:BUILD, activeProfileId:null, profiles:[] }; }

/* ---------- sample engineering profile (the importable example) ---------- */
function sampleEngineeringProfile(){
  const p = blankProfile("Demo Engineer — Generic sample");
  p.meta = { name:"Demo Engineer", postcode:"", location:"",
    targetRoles:"Maintenance engineer, engineering technician, workshop engineer, depot technician, manufacturing engineer, medical engineering technician",
    sectors:"Manufacturing, medical devices, rail, aerospace, laboratory automation, pharma, facilities maintenance",
    salaryMin:35000, salaryPref:42000, commuteMax:90, drivingAvailable:false, travelMax:25,
    workPref:"Fixed-site / onsite",
    keySkills:"Electro-mechanical fault finding, PPM, RCA, regulated documentation, hydraulics, pneumatics, automation, safety-critical maintenance",
    keyExperience:"Engineering maintenance experience in regulated or safety-critical environments, with strong fault diagnosis and documentation discipline.",
    qualifications:"Add your relevant engineering qualifications, platform training and leadership courses here.",
    restrictions:"Add deal-breakers here, for example no routine driving, max commute, shift limits or travel limits.",
    tone:"Direct", disclosureNotes:"", staleThresholdDays:10, weeklySummaryStyle:"Personal review", nearbyTowns:"" };
  const rawJobs = [
    { company:"Example Manufacturing Ltd", role:"Maintenance Engineer", siteAddress:"Example town", salary:"40000", commuteMins:45, drivingRequired:false, travelPct:0, techFit:7, wlb:7, stage:"Target", decision:"Qualify first", nextAction:"Check shift pattern, salary and fixed-site requirements.", dueDate:todayISO(), mainRisk:"Demo record only. Replace with your own job.", notes:"Fictional sample job. Safe to delete.", waiting:"me", appliedDate:"", source:"Demo", ref:"", priority:"Medium" },
    { company:"Example Medical Systems", role:"Technical Support Engineer", siteAddress:"Example city", salary:"42000", commuteMins:60, drivingRequired:false, travelPct:10, techFit:8, wlb:7, stage:"Watchlist", decision:"Qualify first", nextAction:"Confirm whether support is fixed-site or field-based.", dueDate:todayISO(), mainRisk:"Driving/travel requirement unclear.", notes:"Fictional sample job. Safe to delete.", waiting:"me", appliedDate:"", source:"Demo", ref:"", priority:"Medium" },
    { company:"Example Rail Depot", role:"Depot Technician", siteAddress:"Example depot", salary:"38000", commuteMins:35, drivingRequired:false, travelPct:0, techFit:7, wlb:8, stage:"Target", decision:"Apply now", nextAction:"Prepare fixed-site maintenance CV and apply if commute checks out.", dueDate:todayISO(), mainRisk:"Confirm shifts and medical/DBS requirements.", notes:"Fictional sample job. Safe to delete.", waiting:"me", appliedDate:"", source:"Demo", ref:"", priority:"High" }
  ];
  p.jobs = rawJobs.map(j=>Object.assign({id:uid(), contactId:"", log:[], updated:todayISO(), evidenceUrl:"", interviewDate:"", interviewType:"", interviewLocation:"", interviewNotes:"", cvUsed:"", coverLetterUsed:"", dbsLikely:"Unknown", disclosureStatus:"Not needed", advertText:"", transitChecked:""}, j));
  p.contacts = [
    {id:uid(),name:"Example Recruiter",email:"",phone:"",linkedinUrl:"",company:"Example Agency",role:"Recruiter",type:"network",status:"Planned",lastTouchDate:todayISO(),nextTouchDate:todayISO(),followUpRule:"auto",jobIds:[],timeline:[{date:todayISO(),note:"Fictional sample contact. Replace with your own recruiter."}],updated:todayISO()}
  ];
  p.cvVariants=[{id:uid(),name:"Fixed-site engineering CV",note:"Demo CV variant. Replace with your own.",updated:todayISO()}];
  p.evidence=[{id:uid(),text:"Add your strongest technical evidence bullets here.",updated:todayISO()}];
  p.starBank=[{id:uid(),title:"Technical fault diagnosis example",situation:"",task:"",action:"",result:"",updated:todayISO()}];
  return p;
}
/* ---------- persistence ---------- */
let root=null;
function P(){ return (root.profiles||[]).find(p=>p.id===root.activeProfileId) || null; }
function S(){ const m=(P()||{meta:defaultMeta()}).meta;

function normaliseProfile(p){
  const d=blankProfile(); for(const k in d){ if(!(k in p)) p[k]=d[k]; }

  (p.jobs||[]).forEach(j=>{ if(!j.log)j.log=[]; if(!j.id)j.id=uid(); if(!j.priority)j.priority="Medium"; if(!j.appliedDate)j.appliedDate=""; if(!j.source)j.source=""; if(!j.ref)j.ref=""; if(!j.evidenceUrl)j.evidenceUrl=""; if(!j.advertText)j.advertText=""; if(!j.transitChecked)j.transitChecked=""; });

/* ============================================================
   SCORING ENGINE (priorities from active profile)
   ============================================================ */
function scoreJob(j){
  const st=S(); const r=[]; let pts=0; const max=100;
  if(j.drivingRequired){
    if(!st.drivingAllowed){ r.push(["red","Driving required — your hard filter"]); }
    else { pts+=20; r.push(["amber","Driving required, allowed"]); }
  } else { pts+=35; r.push(["green","No regular driving"]); }
  const tf=Number(j.techFit||0); pts+=Math.round(tf/10*25);
  r.push([tf>=7?"green":tf>=4?"amber":"grey","Tech fit "+tf+"/10"]);
  const cm=Number(j.commuteMins||0);
  if(cm<=60){ pts+=20; r.push(["green",cm+" min commute"]); }
  else if(cm<=st.maxJourneyMins){ pts+=10; r.push(["amber",cm+" min commute"]); }
  else { r.push(["red",cm+" min — over "+st.maxJourneyMins]); }
  const sal=Number(j.salary||0);
  if(!sal){ pts+=4; r.push(["grey","Salary unknown"]); }
  else if(sal>=st.salaryMin){ pts+=12; r.push(["green",money(sal)]); }
  else { r.push(["red",money(sal)+" — below "+money(st.salaryMin)]); }
  const tp=Number(j.travelPct||0); let wpts=Number(j.wlb||0)/10*4;
  if(tp<=st.maxTravelPct) wpts+=4; else r.push(["amber",tp+"% travel — over "+st.maxTravelPct+"%"]);
  pts+=Math.round(wpts);
  let score=Math.round(pts/max*100)/10;
  if(j.drivingRequired && !st.drivingAllowed) score=Math.min(score,2.5);
  if(cm>st.maxJourneyMins) score=Math.min(score,4.0);
  return { score:Math.min(10,Math.max(0,Number(score.toFixed(1)))), reasons:r };
}
function suggestDecision(j){
  const {score}=scoreJob(j);
  if(j.drivingRequired && !S().drivingAllowed) return "Reject";
  if(Number(j.commuteMins||0)>S().maxJourneyMins) return "Reject";
  if(j.stage==="Interview") return "Prepare interview";
  if(score>=7.5) return "Apply now";
  if(score>=5.5) return "Qualify first";
  if(score>=4) return "Keep warm";
  return "Reject";
}
function jobBand(j){ const dec=j.decision||suggestDecision(j);
  if(dec.startsWith("Apply")||dec.startsWith("Prepare")) return 1;
  if(dec.startsWith("Qualify")||dec.startsWith("Follow")) return 2;
  if(dec.startsWith("Keep")) return 3; return 4; }
function isOverdue(d){ return d && daysBetween(todayISO(),d)>0; }
function isDueToday(d){ return d && d===todayISO(); }
function isStale(j){ const ref=j.updated||j.dueDate; return ref && daysBetween(todayISO(),ref)>=S().staleThresholdDays; }

function normKey(s){ return (s||"").toString().trim().toLowerCase().replace(/[^a-z0-9]+/g," ").trim(); }
function jobKey(j){ return [normKey(j.company),normKey(j.role)].join("|"); }
function findJobDuplicateIn(profile, incoming){
  const ref=normKey(incoming.ref); const comp=normKey(incoming.company); const role=normKey(incoming.role);
  return (profile.jobs||[]).find(j=>{
    if(ref && normKey(j.ref)===ref) return true;
    return normKey(j.company)===comp && normKey(j.role)===role;
  });
}
function stageRank(s){ return {"Target":0,"Applied":1,"Screening":2,"Interview":3,"Offer":4,"Warm lead":1,"Watchlist":0,"Closed":9}[s] ?? 0; }
function calcChaseDate(j){
  if(!j.appliedDate || ["Closed"].includes(j.stage) || ["Archive","Reject"].includes(j.decision)) return "";
  if(j.dueDate) return j.dueDate;
  const d=new Date(j.appliedDate+"T00:00:00"); if(isNaN(d)) return "";
  const days = j.stage==="Interview" ? 2 : (j.stage==="Screening" ? 5 : 7);
  d.setDate(d.getDate()+days); return d.toISOString().slice(0,10);
}
function evidenceLine(j){
  const parts=[]; if(j.appliedDate) parts.push("Applied "+fmtDate(j.appliedDate)); if(j.source) parts.push(j.source); if(j.ref) parts.push("Ref "+j.ref);
  return parts.join(" · ");
}
function mergeJob(existing,incoming){
  let updated=false;
  const fill=["appliedDate","source","ref","evidenceUrl","siteAddress","salary","commuteMins","travelPct","mainRisk","priority"];
  fill.forEach(k=>{ if((existing[k]==null||existing[k]==="") && incoming[k]){ existing[k]=incoming[k]; updated=true; } });
  if(stageRank(incoming.stage)>stageRank(existing.stage)){ existing.stage=incoming.stage; updated=true; }
  if(incoming.decision && (!existing.decision || existing.decision==="Qualify first" || existing.decision==="Keep warm")){ existing.decision=incoming.decision; updated=true; }
  if(incoming.nextAction && (!existing.nextAction || existing.nextAction==="Archive")){ existing.nextAction=incoming.nextAction; updated=true; }
  if(incoming.dueDate && (!existing.dueDate || incoming.appliedDate>=(existing.appliedDate||""))){ existing.dueDate=incoming.dueDate; updated=true; }
  if(incoming.notes && !String(existing.notes||"").includes(incoming.notes.slice(0,40))){ existing.notes=(existing.notes?existing.notes+"\n\n":"")+incoming.notes; updated=true; }
  if(updated) existing.updated=todayISO();
  return updated;
}

   v13.7: interview, action engine, data health and risk helpers
   ============================================================ */
function isClosedJob(j){ return ["Archive","Reject"].includes(j.decision) || j.stage==="Closed"; }
function dateOnly(s){ return (s||"").slice(0,10); }
function fmtDateTime(s){ if(!s) return "—"; const d=new Date(s); if(isNaN(d)) return s; return d.toLocaleString("en-GB",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"}); }
function daysUntilDate(s){ if(!s) return null; const d=dateOnly(s); if(!d) return null; return daysBetween(d,todayISO()); }
function interviewLabel(j){
  if(!j.interviewDate) return "";
  const n=daysUntilDate(j.interviewDate);
  if(n===null) return fmtDateTime(j.interviewDate);
  if(n<0) return "Interview passed";
  if(n===0) return "Interview today";
  if(n===1) return "Interview tomorrow";
  return "Interview in "+n+" days";
}
function drivingRisk(j){
  const role=(j.role||"").toLowerCase(), notes=(j.notes||" "+j.mainRisk||"").toLowerCase(), site=(j.siteAddress||"").toLowerCase();
  const txt=[role,notes,site,j.source||""].join(" ").toLowerCase();
  const high=["field service","mobile engineer","territory","company car","full uk driving","driving licence","travel required","on call","call-out","call out"];
  const low=["depot","workshop","fixed site","fixed-site","manufacturing","laboratory","hospital","rail depot","site based","site-based","assembler","technician allerton"];
  if(j.drivingRequired || high.some(w=>txt.includes(w))) return {risk:"High",reason:"Driving/travel signal"};
  if(low.some(w=>txt.includes(w)) || Number(j.travelPct||0)<=10) return {risk:"Low",reason:"Fixed-site/depot signal"};
  return {risk:"Unclear",reason:"Needs checking"};
}
function bestNextAction(j){
  if(!j) return "—";
  const dec=j.decision||suggestDecision(j);
  if(isClosedJob(j) || dec==="Reject" || dec==="Archive") return "Closed — no action.";
  if(j.interviewDate){
    const n=daysUntilDate(j.interviewDate);
    if(n!==null && n>=0) return interviewLabel(j)+" — finish interview prep and travel plan.";
  }
  const warns=dataWarnings(j);
  if(warns.some(w=>w.includes("exact role"))) return "Confirm exact role title.";
  if(warns.some(w=>w.includes("Driving"))) return "Clarify driving/travel requirement before progressing.";
  if(j.stage==="Applied" || j.stage==="Screening"){
    const chase=calcChaseDate(j);
    if(chase && daysBetween(todayISO(),chase)>=0) return "Chase application now.";
    if(chase) return "Wait until "+fmtDate(chase)+", then chase.";
  }
  if((dec||"").startsWith("Apply")) return "Apply or finish application.";
  if((dec||"").startsWith("Qualify")) return "Qualify salary, site, travel and driving requirement.";
  return j.nextAction || dec || "Set a next action.";
}
function dataWarnings(j){
  const w=[];
  if(!j.company) w.push("Missing company");
  if(!j.role || /role not visible|not visible|unknown/i.test(j.role)) w.push("Missing exact role title");
  if(!j.siteAddress) w.push("Missing location/site");
  if((j.stage==="Applied"||j.appliedDate) && !j.appliedDate) w.push("Missing applied date");
  if(j.appliedDate && !j.source) w.push("Missing source/recruiter");
  if(j.appliedDate && !j.evidenceUrl && !j.ref) w.push("Missing evidence or reference");
  if(drivingRisk(j).risk==="Unclear") w.push("Driving/travel requirement unclear");
  if(!j.nextAction && !isClosedJob(j)) w.push("No manual next action");
  if(!j.contactId && ["Applied","Screening","Interview","Offer","Warm lead"].includes(j.stage)) w.push("No linked contact");
  return w;
}
function openDataHealth(){
  const p=P(); const rows=[];
  p.jobs.forEach(j=>{ const w=dataWarnings(j); if(w.length) rows.push({j,w}); });
  const body=rows.length?rows.map(x=>`<div class="card tap" onclick="openJob('${x.j.id}')"><div class="row between"><div><b>${esc(x.j.company||"Missing company")}</b><div class="muted">${esc(x.j.role||"Missing role")}</div></div><span class="pill red">${x.w.length}</span></div><div class="reasons" style="margin-top:8px">${x.w.map(w=>`<span><span class="dot amber"></span> ${esc(w)}</span>`).join("")}</div></div>`).join(""):`<div class="card"><div class="empty">No data-health warnings found.</div></div>`;
  sheet("Data health",`<p class="muted">Records with missing information or unclear risk.</p>${body}<div class="btnrow" style="margin-top:12px"><button class="btn" onclick="exportJobsCSV()">Export CSV</button></div>`);
}

/* ============================================================
   ACTION ENGINE
   ============================================================ */
function buildActions(){
  const p=P(); if(!p) return []; const out=[];
  p.jobs.forEach(j=>{
    if(["Archive","Reject"].includes(j.decision)) return;
    const dec=j.decision||suggestDecision(j); const sc=scoreJob(j).score;
    if(j.dueDate && isOverdue(j.dueDate)){
      out.push({pri:0+(5-jobBand(j))*0.1,kind:"job",title:(j.nextAction||"Action")+" — "+j.company,
        why:"Overdue "+Math.abs(daysBetween(todayISO(),j.dueDate))+"d · "+dec,ref:j.id});
    } else if(dec.startsWith("Apply") && j.stage!=="Applied"){
      out.push({pri:1.0-sc/100,kind:"job",title:"Apply: "+j.company+" — "+j.role,why:"Score "+sc+"/10 · ready to apply",ref:j.id});
    } else if(dec.startsWith("Prepare")){
      out.push({pri:0.5,kind:"job",title:"Prep interview: "+j.company,why:"Interview stage",ref:j.id});
    } else if(j.dueDate && isDueToday(j.dueDate)){
      out.push({pri:1.2,kind:"job",title:(j.nextAction||"Action")+" — "+j.company,why:"Due today · "+dec,ref:j.id});
    } else if(dec.startsWith("Qualify")){
      out.push({pri:2.0-sc/100,kind:"job",title:"Qualify: "+j.company+" — "+j.role,why:"Score "+sc+"/10 · "+(j.mainRisk||"open questions"),ref:j.id});
    }
  });
  p.contacts.forEach(c=>{
    if(["Dead / archive","Closed / not useful","Archived"].includes(c.status)) return;
    if(isContactOverdue(c)){ out.push({pri:0.4,kind:"contact",title:"Chase contact: "+c.name+(c.company?" ("+c.company+")":""),why:"Contact overdue since "+fmtDate(c.nextTouchDate)+" · "+(c.status||""),ref:c.id}); }
    else if(isContactDueToday(c)){ out.push({pri:1.1,kind:"contact",title:"Contact due today: "+c.name,why:(c.status||"Follow-up")+" · due today",ref:c.id}); }
    else if(c.status==="Planned"){ out.push({pri:2.5,kind:"contact",title:"Reach out: "+c.name+(c.company?" ("+c.company+")":""),why:"Outreach planned",ref:c.id}); }
  });
  out.sort((a,b)=>a.pri-b.pri); return out;
}
function urgentCount(){ const p=P(); if(!p) return 0;
  return p.jobs.filter(j=>!["Archive","Reject"].includes(j.decision)&&isOverdue(j.dueDate)).length + p.contacts.filter(c=>isContactOverdue(c)||isContactDueToday(c)).length; }

function normName(s){ return (s||"").trim().toLowerCase().replace(/\s+/g," "); }
function findContactDuplicate(name,email,exceptId){
  return P().contacts.find(c=> c.id!==exceptId && (
    (email && c.email && c.email.toLowerCase()===email.toLowerCase()) ||
    (name && normName(c.name)===normName(name)) )); }
function ensureContactForJob(job,name,email){
  if(!name && !email) return; const p=P();
  let c=findContactDuplicate(name,email);
  if(!c){ c={id:uid(),name:name||email,email:email||"",phone:"",linkedinUrl:"",company:job.company||"",role:"",type:"pipeline",status:"Planned",lastTouchDate:todayISO(),nextTouchDate:defaultNextTouch("Planned",todayISO()),followUpRule:"auto",jobIds:[],timeline:[{date:todayISO(),note:"Contact created from job link."}],updated:todayISO()}; p.contacts.push(c); }
  if(!c.jobIds.includes(job.id)) c.jobIds.push(job.id); job.contactId=c.id;
}
function mergeContacts(keepId,dropId){ const p=P();
  const keep=p.contacts.find(c=>c.id===keepId),drop=p.contacts.find(c=>c.id===dropId); if(!keep||!drop)return;
  keep.email=keep.email||drop.email; keep.company=keep.company||drop.company; keep.role=keep.role||drop.role;
  keep.jobIds=[...new Set([...(keep.jobIds||[]),...(drop.jobIds||[])])];
  keep.timeline=[...(keep.timeline||[]),...(drop.timeline||[])].sort((a,b)=>(a.date||"").localeCompare(b.date||""));
  p.jobs.forEach(j=>{ if(j.contactId===dropId) j.contactId=keepId; });
  p.contacts=p.contacts.filter(c=>c.id!==dropId); save();
}
function contactForJob(j){ return P().contacts.find(c=>c.id===j.contactId); }
function findAllDuplicates(){ const p=P(); const out=[],seen=new Set();
  for(let i=0;i<p.contacts.length;i++)for(let k=i+1;k<p.contacts.length;k++){ const a=p.contacts[i],b=p.contacts[k];
    if((a.email&&b.email&&a.email.toLowerCase()===b.email.toLowerCase())||normName(a.name)===normName(b.name)){
      const key=[a.id,b.id].sort().join("|"); if(!seen.has(key)){seen.add(key);out.push([a,b]);} } } return out; }

function firstLineLike(text,patterns){ const arr=(text||"").split(/\n+/).map(x=>x.trim()).filter(Boolean); for(const pat of patterns){ const hit=arr.find(x=>pat.test(x)); if(hit) return hit.replace(/^(job title|title|role|position)\s*[:\-]\s*/i,""); } return ""; }
function hasUnnegated(text, pattern){
  const flags=pattern.flags.includes("g")?pattern.flags:pattern.flags+"g";

    const neg=/\b(no|not|without|doesn['’]?t|do not|don['’]?t)\b[^.\n]{0,55}\b(driv(?:ing|er)|licen[cs]e|travel|company car|field service|territory|customer sites)\b|\b(driv(?:ing|er)|licen[cs]e|travel|company car|field service|territory|customer sites)\b[^.\n]{0,55}\b(not required|not essential|not needed|not mandatory|isn['’]?t required|no requirement)\b/i.test(ctx);

function parseAdvertText(text){
  const t=text||"", linesArr=t.split(/\n+/).map(x=>x.trim()).filter(Boolean);
  const salary=(t.match(/£\s?\d{1,3}(?:\.\d{1,2})?(?:[,\s]?\d{3})?(?:\s?(?:-|–|to)\s?£?\s?\d{1,3}(?:\.\d{1,2})?(?:[,\s]?\d{3})?)?\s*(?:k|K|pa|per annum|a year|\/year|per\s+hour|\/hour|ph|p\/h)?/)||[""])[0].trim();
  const ref=(t.match(/\b(?:ref(?:erence)?|job\s*id|vacancy|req(?:uisition)?|id)\b\s*[:#\-]?\s*([A-Z0-9][A-Z0-9\-\/]{3,})/i)||t.match(/\bBBBH\d+\b/i)||[]).pop()||"";
  let role=firstLineLike(t,[/engineer|technician|fitter|assembler|maintenance|medical|process|manufacturing|instrument|reliability|skilled/i]) || (linesArr[0]||"");
  let company="";
  const compLine=linesArr.find(x=>/^(company|employer|organisation|organization)\s*[:\-]/i.test(x));
  if(compLine) company=compLine.replace(/^[^:\-]+[:\-]\s*/,'');
  if(!company){ const at=role.match(/\b(?:at|with|for)\s+(.+)$/i); if(at) company=at[1].trim(); }
  if(company){ role=role.replace(new RegExp("\\s+(?:at|with|for)\\s+"+company.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+"\\s*$","i"),"").trim(); }
  role=role.replace(/\s+[-–|]\s+.*$/,'').trim();
  const locLine=linesArr.find(x=>/^(location|site|based)\s*[:\-]/i.test(x));
  let location=locLine?locLine.replace(/^[^:\-]+[:\-]\s*/,''):"";
  if(!location){
    const known=[...new Set([...(S().nearbyTowns||[]),"Liverpool","Halewood","Broughton","Bromborough","Runcorn","Speke","Warrington","Allerton","Hunts Cross","Manchester","Macclesfield","Winsford","Daresbury","Port Sunlight","Wirral","Chester","Stockport","Dublin","Cork","Prescot"])];
    const hit=known.find(k=>new RegExp("\\b"+k.replace(/ /g,"\\s+")+"\\b","i").test(t)); if(hit) location=hit;
  }
  const fixedLow=/fixed[-\s]?site|depot|workshop|manufacturing|factory|laboratory|lab|hospital|onsite|on-site|rail depot/i.test(t);

  const weakLicence=hasUnnegated(t,/full\s+uk\s+driv(?:ing|er)|driv(?:ing|er)['’]?s?\s+licen[cs]e/i);

function salaryToNumber(salaryText){
  const raw=(salaryText||"").toLowerCase();

  const m=raw.match(/(\d{2,3})(?:[,\s]?(\d{3}))?/); if(!m) return "";

  return n?String(n):"";

let contactFilter="all", contactSearch="";
function viewContacts(){
  const p=P(); const dups=findAllDuplicates(); let list=[...p.contacts];
  if(contactSearch.trim()) list=list.filter(c=>matchesSearch(contactSearch,[c.name,c.company,c.role,c.email,c.phone,c.linkedinUrl,c.status]));
  if(contactFilter==="pipeline") list=list.filter(c=>c.type==="pipeline");
  else if(contactFilter==="network") list=list.filter(c=>c.type==="network");
  else if(contactFilter==="active") list=list.filter(c=>["Planned","Sent / awaiting reply","Replied / live","Interview / process"].includes(c.status));
  else if(contactFilter==="overdue") list=list.filter(c=>isContactOverdue(c)||isContactDueToday(c));
  list.sort((a,b)=>{
    const ao=isContactOverdue(a)?2:isContactDueToday(a)?1:0, bo=isContactOverdue(b)?2:isContactDueToday(b)?1:0;
    if(bo!==ao) return bo-ao;
    return (a.nextTouchDate||"9999").localeCompare(b.nextTouchDate||"9999") || (b.updated||"").localeCompare(a.updated||"");
  });
  const chips=[["all","All"],["overdue","Due / overdue"],["active","Active"],["pipeline","Pipeline"],["network","Network"]];
  let h=`<div class="row between"><h1>Contacts</h1><button class="btn primary sm" onclick="openContact()">+ Add</button></div>`;
  h+=`<input class="in searchbar" id="contactSearch" type="search" placeholder="Search name, company, role, email…" value="${esc(contactSearch)}" oninput="setContactSearch(this.value)" autocomplete="off">`;
  if(dups.length) h+=`<div class="warnbox">Possible duplicates: ${dups.map(d=>esc(d[0].name)).join(", ")}. <a href="#" onclick="reviewDuplicates();return false;" style="color:#ff9b95;text-decoration:underline">Review</a></div>`;
  h+=`<div class="chips">`+chips.map(c=>`<button class="chip ${contactFilter===c[0]?'on':''}" onclick="setContactFilter('${c[0]}')">${c[1]}</button>`).join("")+`</div>`;
  if(!list.length) return h+`<div class="card"><div class="empty">No contacts in this view.</div></div>`;
  h+=`<div class="grid cols-2">`+list.map(contactCard).join("")+`</div>`; return h;
}

function saveContact(id){
  const p=P(); const get=s=>$("#"+s).value.trim(); const name=get("c_name"),email=get("c_email");
  if(!name){ toast("Name required"); return; }
  const dup=findContactDuplicate(name,email,id||null);
  if(dup && !id){ if(!confirm(`Possible duplicate of "${dup.name}". Add anyway?`)) return; }
  const status=$("#c_status").value; const last=get("c_lasttouch")||todayISO(); const next=get("c_nexttouch")||defaultNextTouch(status,last);
  const data={name,email,phone:get("c_phone"),linkedinUrl:get("c_linkedin"),company:get("c_company"),role:get("c_role"),type:$("#c_type").value,status,lastTouchDate:last,nextTouchDate:next,followUpRule:"manual",updated:todayISO()};
  if(id){
    const c=p.contacts.find(x=>x.id===id); const oldStatus=c.status; const oldNext=c.nextTouchDate; Object.assign(c,data);
    if(oldStatus!==status){ c.timeline=c.timeline||[]; c.timeline.push({date:todayISO(),note:`Status changed from “${oldStatus||'blank'}” to “${status}”. Next touch: ${fmtDate(next)}.`}); }
    else if(oldNext!==next){ c.timeline=c.timeline||[]; c.timeline.push({date:todayISO(),note:`Next touch changed to ${fmtDate(next)}.`}); }
  } else {
    p.contacts.push({id:uid(),jobIds:[],timeline:[{date:todayISO(),note:`Contact created. Status: ${status}. Next touch: ${fmtDate(next)}.`}],...data});
  }
  save(); closeSheet(); render(); toast("Saved");
}

function linkJobToContact(contactId,jobId){ const p=P(); const c=p.contacts.find(x=>x.id===contactId), j=p.jobs.find(x=>x.id===jobId); if(!c||!j)return; c.jobIds=c.jobIds||[]; if(!c.jobIds.includes(jobId)) c.jobIds.push(jobId); j.contactId=contactId; c.timeline=c.timeline||[]; c.timeline.push({date:todayISO(),note:`Linked job: ${j.company} — ${j.role}.`}); c.updated=todayISO(); save(); closeSheet(); setTimeout(()=>openContact(contactId),50); }
function unlinkJobFromContact(contactId,jobId){ const p=P(); const c=p.contacts.find(x=>x.id===contactId), j=p.jobs.find(x=>x.id===jobId); if(!c||!j)return; c.jobIds=(c.jobIds||[]).filter(id=>id!==jobId); if(j.contactId===contactId)j.contactId=""; c.timeline=c.timeline||[]; c.timeline.push({date:todayISO(),note:`Unlinked job: ${j?j.company:""} — ${j?j.role:""}.`}); c.updated=todayISO(); save(); closeSheet(); setTimeout(()=>openContact(contactId),50); }
function reviewDuplicates(){

const INTERVIEW_PREP_SECTIONS = [
  ["roleFacts","Role facts"],
  ["whyMe","Why me"],
  ["whyEmployer","Why this employer"],
  ["technicalExamples","Technical examples"],
  ["starAnswers","STAR answers to use"],
  ["drivingTravel","Driving / travel clarification"],
  ["disclosureHandling","Disclosure / DBS handling"],
  ["questionsToAsk","Questions to ask"],
  ["redFlags","Red flags to clarify"],
  ["pitch","Final 60-second pitch"],
  ["travelPlan","Travel plan"],
  ["finalCrib","Final crib sheet"]
];
function defaultInterviewPrep(j){
  const p=P(), m=p.meta, dr=drivingRisk(j); const c=contactForJob(j);
  const ev=p.evidence.slice(0,4).map(e=>"- "+e.text).join("\n") || "- Abbott/Sysmex/Royal Navy engineering evidence. Add sharper bullets in Prep.";
  const stars=p.starBank.length ? p.starBank.map(s=>`- ${s.title}: ${s.result||s.action||"finish this STAR example"}`).join("\n") : "- Add STAR examples in Prep before interview.";
  const salary=j.salary?money(j.salary):"not confirmed";
  const site=j.siteAddress||j.interviewLocation||"not confirmed";
  const cv=j.cvUsed||"confirm which CV was submitted";
  const dbs=j.dbsLikely||"Unknown";
  return {
    roleFacts:`Company: ${j.company||"?"}\nRole: ${j.role||"?"}\nSite/location: ${site}\nSalary: ${salary}\nStage: ${j.stage||"?"}\nInterview: ${j.interviewDate?fmtDateTime(j.interviewDate):"not set"}${j.interviewType?" · "+j.interviewType:""}\nContact: ${c?c.name:"not linked"}\nCV used: ${cv}`,
    whyMe:`Lead with a fixed-site engineering fit. Emphasise medical diagnostics, automated laboratory equipment, electro-mechanical fault finding, RCA/log analysis, documentation discipline and Royal Navy safety-critical engineering.\n\nEvidence to use:\n${ev}`,
    whyEmployer:`Keep this specific. Mention the employer's site, product, sector and why the role is a practical fit. Do not use generic praise.\n\nDraft:\nI am interested because this is a hands-on engineering role where reliability, documentation and quick fault recovery matter. The fixed-site / controlled engineering environment fits my current search better than field-service work.` ,
    technicalExamples:`Prepare examples around:\n- PCR / analyser troubleshooting and downtime recovery.\n- Robotic or automated sample-handling faults.\n- Log-file analysis and root cause investigation.\n- Planned maintenance and compliance documentation.\n- Royal Navy electro-mechanical systems under pressure.\n\nFor each: problem, diagnostic steps, fix, verification, documentation.` ,
    starAnswers:stars,
    drivingTravel:`Current risk rating: ${dr.risk}.\nClarify directly if needed:\n- Is this fixed-site, depot, lab, hospital or manufacturing based?\n- Is a full UK driving licence essential day-to-day?\n- Is there field travel, company vehicle, call-out territory or routine site-to-site driving?\n\nControlled wording:\nBefore progressing, could I confirm whether the role is fixed-site or whether it requires regular driving/territory travel? I want to make sure the practical arrangements fit before we go further.` ,
    disclosureHandling:`DBS likely: ${dbs}.\nDisclosure status: ${j.disclosureStatus||"Not needed"}.\n\nDo not volunteer unnecessary detail early. If asked, keep wording factual, brief and tied to relevance. For NHS/regulated roles, use the separate prepared disclosure note at the correct stage only.` ,
    questionsToAsk:`- What does a normal shift/day look like?\n- What equipment or systems would I support first?\n- What are the common failure modes?\n- How is escalation handled?\n- What documentation or quality system is used?\n- What training is provided?\n- Is the role fixed-site, and what travel/driving is expected?\n- What are the next steps and timescale after interview?`,
    redFlags:`Clarify before accepting or progressing too far:\n- Driving/licence requirement unclear.\n- Excessive travel or territory work.\n- Salary below target.\n- Long/public-transport-unworkable commute.\n- DBS/disclosure stage unclear.\n- Job title sounds fixed-site but duties are actually field/mobile.` ,
    pitch:`I am an electro-mechanical engineer with medical diagnostics field-service experience and a Royal Navy engineering background. I have worked on PCR and laboratory analyser platforms, dealt with urgent faults, used logs and structured diagnostics, and maintained high standards of documentation and safety. I am now focused on a fixed-site engineering role where I can use that fault-finding and reliability experience without a field-service territory.` ,
    travelPlan:`Interview location/link: ${j.interviewLocation||"not set"}.\nCommute estimate: ${j.commuteMins?j.commuteMins+" minutes one-way":"not checked"}.\nAction: check public transport route, arrival buffer, site entrance, ID requirements and who to ask for on arrival.` ,
    finalCrib:`Opening: calm, concise, engineering-first.\nLead examples: Abbott diagnostics, Sysmex, Royal Navy safety-critical maintenance.\nMust clarify: driving/travel, shift pattern, training, salary/next stage.\nAvoid: over-explaining personal/legal issues unless directly asked and relevant.\nClose: ask for timeline and whether they need anything further.`
  };
}
function interviewPrepTextFromData(j,data){
  return `INTERVIEW PREP WORKSPACE — ${j.company}: ${j.role}\n\n` + INTERVIEW_PREP_SECTIONS.map(([k,label])=>`${label.toUpperCase()}\n${(data&&data[k])||""}`).join("\n\n---\n\n");
}
function openInterviewPrep(id){

  body+=INTERVIEW_PREP_SECTIONS.map(([k,label])=>`<label class="f">${label}</label><textarea class="in" id="prep_${k}" style="min-height:${k==='finalCrib'||k==='pitch'?110:130}px">${esc(data[k]||"")}</textarea>`).join("");

function currentInterviewPrepData(j){

function genFromJob(id){
  const kinds=[["application","Application email"],["cover","Cover letter"],["recruiter","Recruiter follow-up"],["linkedin","LinkedIn message"],["salary","Salary clarification"],["driving","Driving / travel clarification"],["interview","Interview prep sheet"]];

}
function greet(first,tone){ return tone==="Formal"?("Dear "+(first&&first!=="there"?first:"Hiring Manager")+",") : ("Hi "+first+","); }
function signoff(tone,name){ return tone==="Formal"?("Yours sincerely,\n"+name) : tone==="Warm"?("Best wishes,\n"+name):("Thanks,\n"+name); }
function genContactMsg(id){
  const p=P(); const c=p.contacts.find(x=>x.id===id); const m=p.meta; const name=m.name||"";
  const first=(c.name||"").split(" ")[0]||c.name||"there"; const tone=m.tone||"Direct";
  const roles=m.targetRoles? m.targetRoles.split(/[,;\n]/)[0].trim() : "roles in my field";
  const out = c.type==="network"
    ? `${greet(first,tone)}\n\nGood to reconnect. I'm looking at ${roles.toLowerCase()} and would value a quick steer. ${m.keyExperience?("Given my background ("+m.keyExperience.split(".")[0]+"), "):""}is anything open or coming up on your side worth a conversation?\n\nHappy to share a short CV.\n\n${signoff(tone,name)}`
    : `${greet(first,tone)}\n\nFollowing up on the role we discussed${c.company?" at "+c.company:""}. I remain interested and can move quickly. Is there an update on next steps or anything you need from me?\n\n${signoff(tone,name)}`;
  showGen("Message to "+c.name,out);
}
function runGen(kind,jobId){
  const p=P(); const m=p.meta; const name=m.name||""; const tone=m.tone||"Direct";
  const j=jobId?p.jobs.find(x=>x.id===jobId):null; const c=j?contactForJob(j):null;
  const first=c?((c.name.split(" ")[0])||c.name):"there";
  const variant=p.cvVariants[0]?p.cvVariants[0].name:"my CV";
  const ev=p.evidence.slice(0,3).map(e=>"- "+e.text).join("\n") || (m.keyExperience?("- "+m.keyExperience):"- [add evidence bullets in Prep]");
  const bg=m.keyExperience||"my background";
  const prefLine={ "Remote":"I'm focused on remote roles","Hybrid":"I'm open to hybrid working","Fixed-site / onsite":"I work best in a fixed-site/onsite role","No preference":"I'm flexible on working pattern" }[m.workPref]||"I'm flexible on working pattern";
  let title="Generated",out="";
  switch(kind){
    case "application":
      out=`Subject: Application — ${j.role}, ${j.company}\n\n${greet(first,tone)}\n\nI'd like to apply for the ${j.role} role at ${j.company}${j.siteAddress?" ("+j.siteAddress+")":""}.\n\nRelevant evidence:\n${ev}\n\n${prefLine}${j.siteAddress&&j.siteAddress.toLowerCase()!=="remote"?" and can commute to "+j.siteAddress:""}. CV attached (variant: ${variant}).\n\n${signoff(tone,name)}`; title="Application email"; break;
    case "cover":
      out=`${greet(first==="there"?"":first,tone==="Direct"?"Formal":tone)}\n\nI'm writing regarding the ${j.role} position at ${j.company}. ${bg}.\n\nWhat I'd bring:\n${ev}\n\n${prefLine}. I'd welcome the chance to discuss how my background fits ${j.company}.\n\n${signoff("Formal",name)}`; title="Cover letter"; break;
    case "recruiter":
      out=`${greet(first,tone)}\n\nFollowing up on the ${j.role} role at ${j.company}. I'm still keen and available. Could you let me know where it stands and whether you need anything further from me?\n\n${signoff(tone,name)}`; title="Recruiter follow-up"; break;
    case "linkedin":
      out=`Hi ${first}, I came across the ${j.role} role at ${j.company}. ${m.keyExperience?m.keyExperience.split(".")[0]+". ":""}${prefLine}. Would it be worth a short conversation?`; title="LinkedIn message"; break;
    case "salary":
      out=`${greet(first,tone)}\n\nBefore progressing the ${j.role} role, could you confirm the salary range? My target is ${money(m.salaryMin)}+${m.salaryPref?(" (ideally around "+money(m.salaryPref)+")"):""} depending on responsibilities. Happy to discuss.\n\n${signoff(tone,name)}`; title="Salary clarification"; break;
    case "driving":
      out=`${greet(first,tone)}\n\nOne practical question on the ${j.role} role: is this fixed-site, or does it involve a driving territory or call-out rota requiring a personal vehicle? ${m.restrictions?("Note: "+m.restrictions+". "):""}I want to make sure the role fits before we go further.\n\n${signoff(tone,name)}`; title="Driving / travel clarification"; break;
    case "interview":
      out=interviewPrepTextFromData(j,Object.assign(defaultInterviewPrep(j),j.interviewPrep||{})); title="Interview prep sheet"; break;
    case "star":
      out= p.starBank.length? p.starBank.map(s=>`■ ${s.title}\nSituation: ${s.situation||"?"}\nTask: ${s.task||"?"}\nAction: ${s.action||"?"}\nResult: ${s.result||"?"}`).join("\n\n") : "No STAR examples saved yet. Add them under Prep."; title="STAR answer pack"; break;
  }
  showGen(title,out);
}
function showGen(title,text){
  sheet(title,`<textarea class="in gen-out" id="gen_text" style="min-height:220px">${esc(text)}</textarea><div class="btnrow" style="margin-top:12px"><button class="btn primary" onclick="copyGen()">Copy</button><button class="btn ghost" onclick="closeSheet()">Close</button></div><p class="tiny" style="margin-top:8px">Draft only. Edit before sending. Nothing is sent automatically.</p>`);
}
function copyGen(){ const t=$("#gen_text"); t.select(); try{document.execCommand("copy");}catch(e){} if(navigator.clipboard) navigator.clipboard.writeText(t.value).catch(()=>{}); toast("Copied"); }

function weekStartISO(){ const d=new Date(todayISO()+"T00:00:00"); const day=d.getDay()||7; d.setDate(d.getDate()-day+1); return d.toISOString().slice(0,10); }
function recentJobs(days=7){ return P().jobs.filter(j=> (j.appliedDate&&daysBetween(todayISO(),j.appliedDate)<=days) || (j.updated&&daysBetween(todayISO(),j.updated)<=days)); }
function weeklyCompletedActions(){
  const items=[];
  (P().jobs||[]).forEach(j=>{
    (j.log||[]).forEach(l=>{
      if(l.date && daysBetween(todayISO(),l.date)<=7) items.push({date:l.date,type:"Job",label:`${j.company||"Unknown company"} — ${j.role||"Unknown role"}`,note:l.note||"Logged job activity"});
    });
    if(j.appliedDate && daysBetween(todayISO(),j.appliedDate)<=7) items.push({date:j.appliedDate,type:"Application",label:`${j.company||"Unknown company"} — ${j.role||"Unknown role"}`,note:`Application recorded${j.ref?`, ref ${j.ref}`:""}${j.source?`, source ${j.source}`:""}`});
    if(isClosedJob(j) && j.updated && daysBetween(todayISO(),j.updated)<=7){
      const outcome=j.decision || j.stage || "closed";
      items.push({date:j.updated,type:"Outcome",label:`${j.company||"Unknown company"} — ${j.role||"Unknown role"}`,note:`Marked ${outcome}`});
    }
  });
  (P().contacts||[]).forEach(c=>{
    (c.timeline||[]).forEach(t=>{
      if(t.date && daysBetween(todayISO(),t.date)<=7) items.push({date:t.date,type:"Contact",label:`${c.name||"Unnamed contact"}${c.company?` (${c.company})`:""}`,note:t.note||`Contact activity: ${c.status||"updated"}`});
    });
  });
  const seen=new Set();
  return items.sort((a,b)=>(b.date||"").localeCompare(a.date||"")).filter(x=>{ const k=[x.date,x.type,x.label,x.note].join("|"); if(seen.has(k)) return false; seen.add(k); return true; });
}
function neutralNextStep(){
  const pref=(S().workPref||"No preference").toLowerCase();
  if(pref.includes("remote")) return "Continue applying for suitable remote roles and updating the tracker.";
  if(pref.includes("hybrid")) return "Continue applying for suitable hybrid roles and updating the tracker.";
  if(pref.includes("fixed")||pref.includes("onsite")||pref.includes("on-site")) return "Continue applying for suitable onsite roles and updating the tracker.";
  return "Continue applying for suitable roles and updating the tracker.";
}

  const chases=p.jobs.filter(j=>!isClosedJob(j) && calcChaseDate(j) && daysBetween(todayISO(),calcChaseDate(j))>=0).sort((a,b)=>(calcChaseDate(a)||"").localeCompare(calcChaseDate(b)||""));

  const interviews=p.jobs.filter(j=>j.interviewDate || j.stage==="Interview");

  const linesOut=[];
  const bulletJob=j=>`- ${j.company} — ${j.role}${j.appliedDate?` (applied ${fmtDate(j.appliedDate)})`:""}${j.ref?`, ref ${j.ref}`:""}${j.source?`, source: ${j.source}`:""}`;
  if(style==="UC journal"){

    linesOut.push(""); linesOut.push(`Follow-ups / chases currently due (${chases.length}):`); linesOut.push(chases.length?chases.map(j=>`- ${j.company} — ${bestNextAction(j)}`).join("\n"):"- None currently due.");
    linesOut.push(""); linesOut.push(`Recruiter / contact follow-ups currently due (${contacts.length}):`); linesOut.push(contacts.length?contacts.map(c=>`- ${c.name}${c.company?` (${c.company})`:""} — ${c.status}${c.nextTouchDate?`, next touch ${fmtDate(c.nextTouchDate)}`:""}`).join("\n"):"- None currently due.");
    linesOut.push(""); linesOut.push(`Interview / assessment preparation (${interviews.length}):`); linesOut.push(interviews.length?interviews.map(j=>`- ${j.company} — ${interviewLabel(j)||"interview/prep stage"}`).join("\n"):"- No interviews currently booked.");
    linesOut.push(""); linesOut.push("Next steps:"); linesOut.push(chases.slice(0,5).map(j=>`- ${bestNextAction(j)} (${j.company})`).join("\n") || `- ${neutralNextStep()}`);
  } else if(style==="Recruiter update"){
    linesOut.push(`Job-search status update${name?` — ${name}`:""}`); linesOut.push("");
    linesOut.push(`Current focus: ${m.targetRoles||"suitable engineering roles"}.`);
    linesOut.push(""); linesOut.push(`Recent applications (${apps.length}):`); linesOut.push(apps.length?apps.map(bulletJob).join("\n"):"- None this week.");
    linesOut.push(""); linesOut.push(`Activity completed this week (${completed.length}):`); linesOut.push(completed.length?completed.slice(0,15).map(a=>`- ${fmtDate(a.date)} — ${a.label}: ${a.note}`).join("\n"):"- No activity logged this week.");
    linesOut.push(""); linesOut.push(`Live follow-ups (${chases.length}):`); linesOut.push(chases.length?chases.map(j=>`- ${j.company} — ${j.role}: ${bestNextAction(j)}`).join("\n"):"- None due right now.");
    linesOut.push(""); linesOut.push("Constraints / fit notes:"); linesOut.push(`- Salary target: minimum ${money(m.salaryMin)}${m.salaryPref?`, preferred ${money(m.salaryPref)}`:""}`); linesOut.push(`- Commute limit: ${m.commuteMax||""} minutes`); linesOut.push(`- Work preference: ${m.workPref||""}`); linesOut.push(`- Restrictions: ${m.restrictions||"none stated"}`);
  } else {
    linesOut.push(`Weekly review — ${new Date().toLocaleDateString("en-GB")}`); linesOut.push("");
    linesOut.push(`Applications this week: ${apps.length}`); linesOut.push(`Actions completed this week: ${completed.length}`); linesOut.push(`Follow-ups due/overdue: ${chases.length}`); linesOut.push(`Contacts to chase: ${contacts.length}`); linesOut.push(`Interviews/prep-stage jobs: ${interviews.length}`); linesOut.push(`Closed this week: ${closed.length}`); linesOut.push("");
    linesOut.push("Applications:"); linesOut.push(apps.length?apps.map(bulletJob).join("\n"):"- None recorded.");
    linesOut.push(""); linesOut.push("Completed activity:"); linesOut.push(completed.length?completed.slice(0,20).map(a=>`- ${fmtDate(a.date)} — ${a.label}: ${a.note}`).join("\n"):"- None logged.");
    linesOut.push(""); linesOut.push("Top next actions:"); linesOut.push(chases.slice(0,8).map(j=>`- ${j.company}: ${bestNextAction(j)}`).join("\n") || `- ${neutralNextStep()}`);
    linesOut.push(""); linesOut.push("Gaps:"); const health=p.jobs.filter(j=>!isClosedJob(j)&&dataWarnings(j).length).slice(0,5); linesOut.push(health.length?health.map(j=>`- ${j.company}: ${dataWarnings(j).slice(0,2).join("; ")}`).join("\n"):"- No major data-health gaps flagged.");
  }
  return linesOut.join("\n");
}

/* ---------- .ics ---------- */
function exportICS(){

    const d=j.dueDate.replace(/-/g,""); ev.push(["BEGIN:VEVENT","UID:"+j.id+"-due@careerconsole","DTSTART;VALUE=DATE:"+d,"DTEND;VALUE=DATE:"+d,"SUMMARY:"+(j.nextAction||"Action")+" — "+j.company,"DESCRIPTION:"+(j.role||"")+" | "+bestNextAction(j),"END:VEVENT"].join("\r\n"));
  });
  p.jobs.filter(j=>j.interviewDate&&!isClosedJob(j)).forEach(j=>{
    const d=new Date(j.interviewDate); if(isNaN(d)) return; const stamp=d.toISOString().replace(/[-:]/g,"").replace(/\.\d{3}/,"");
    const end=new Date(d.getTime()+60*60000).toISOString().replace(/[-:]/g,"").replace(/\.\d{3}/,"");
    ev.push(["BEGIN:VEVENT","UID:"+j.id+"-interview@careerconsole","DTSTART:"+stamp,"DTEND:"+end,"SUMMARY:Interview — "+j.company,"DESCRIPTION:"+(j.role||"")+" | "+(j.interviewType||"")+" | "+(j.interviewNotes||""),"LOCATION:"+(j.interviewLocation||j.siteAddress||""),"END:VEVENT"].join("\r\n"));
  });

/* ---------- backup / restore / export / import ---------- */
function downloadFile(name,content,type){
  const blob=new Blob([content],{type:type||"application/json"}); const a=document.createElement("a");
  a.href=URL.createObjectURL(blob); a.download=name; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}
function backupData(){ root.lastBackup=todayISO(); save(); downloadFile("careerconsole_backup_"+todayISO()+".json",JSON.stringify(root,null,2)); toast("Backup downloaded"); render(); }
function exportProfile(){ const p=P(); downloadFile("careerconsole_profile_"+(p.meta.name||"profile").replace(/\W+/g,"_")+".json",JSON.stringify({__type:"careerconsole_profile",profile:p},null,2)); toast("Profile exported"); }
function smartImport(e,fromWelcome){
  const f=e.target.files[0]; if(!f)return; const r=new FileReader();
  r.onload=()=>{ try{ const d=JSON.parse(r.result); applyImport(d,fromWelcome); }catch(err){ toast("Invalid JSON file"); } };
  r.readAsText(f); e.target.value="";
}
function applyImport(d,fromWelcome){
  // full root backup
  if(d && Array.isArray(d.profiles)){
    if(!confirm("Restore full backup? This replaces ALL profiles on this device.")) return;
    root=d; (root.profiles||[]).forEach(normaliseProfile);
    if(!P()) root.activeProfileId=root.profiles[0]?root.profiles[0].id:null;
    save(); TAB="today"; render(); toast("Backup restored"); return;
  }
  // single profile export
  let prof=null;
  if(d && d.__type==="careerconsole_profile" && d.profile) prof=d.profile;
  else if(d && d.meta && (Array.isArray(d.jobs)||Array.isArray(d.contacts))) prof=d;       // bare profile
  else if(d && (Array.isArray(d.jobs)||Array.isArray(d.apps)) && d.settings) prof=wrapWorkspaceAsProfile(d,"Imported");  // v13.0 workspace
  if(prof){ prof.id=uid(); normaliseProfile(prof); root.profiles.push(prof); root.activeProfileId=prof.id; save(); TAB="today"; render(); toast("Profile imported"); return; }
  // looks like a v12 snapshot
  if(d && (d.apps||d.outreach||d.starExamples)){ if(!P()){ const np=blankProfile("Imported"); root.profiles.push(np); root.activeProfileId=np.id; } doImportV12(d); return; }
  toast("Unrecognised file format");
}

    L.push(`  factors: ${sc.reasons.map(r=>r[1]).join("; ")}`); });
  L.push("\n=== CONTACTS ("+p.contacts.length+") ===");
  p.contacts.forEach(c=>L.push(`• ${c.name} (${c.type}/${c.status}) ${c.company||""} — next:${c.nextTouchDate||"-"} phone:${c.phone||"-"} linkedin:${c.linkedinUrl||"-"} linked jobs:${(c.jobIds||[]).length}`));
  L.push("\n=== EVIDENCE ==="); p.evidence.forEach(e=>L.push("- "+e.text));
  L.push("\n=== STAR ==="); p.starBank.forEach(s=>L.push("- "+s.title));
  const text=L.join("\n");
  sheet("Export for AI review",`<p class="muted">Copy into ChatGPT or Claude for a review pass.</p><textarea class="in gen-out" id="gen_text" style="min-height:300px">${esc(text)}</textarea><div class="btnrow" style="margin-top:12px"><button class="btn primary" onclick="copyGen()">Copy</button><button class="btn ghost" onclick="downloadFile('careerconsole_review.txt',$('#gen_text').value,'text/plain');toast('Downloaded')">Download .txt</button></div>`);
}

/* ---------- v12 importer (into active profile) ---------- */
function importV12(e){ const f=e.target.files[0]; if(!f)return; const r=new FileReader();
  r.onload=()=>{ try{ doImportV12(JSON.parse(r.result)); }catch(err){ toast("Invalid JSON"); } }; r.readAsText(f); e.target.value=""; }
function pick(o,keys,def){ for(const k of keys){ if(o&&o[k]!=null&&o[k]!=="") return o[k]; } return def; }
function normaliseStatus(s){ s=String(s).toLowerCase(); if(/sent|await/.test(s))return"Sent / awaiting reply"; if(/repl|live|active/.test(s))return"Replied / live"; if(/dead|archive|closed/.test(s))return"Dead / archive"; return"Planned"; }
function doImportV12(v){
  if(!P()){ const np=blankProfile("Imported"); root.profiles.push(np); root.activeProfileId=np.id; }
  if(!confirm("Import v12 snapshot into the current profile?")) return;
  const p=P(); const rep={jobs:0,contacts:0,cv:0,star:0,evidence:0,templates:0,notes:0,skipped:[]};
  if(v.settings){ const s=v.settings;
    if(s.salaryMin!=null)p.meta.salaryMin=s.salaryMin; if(s.maxJourneyMins!=null)p.meta.commuteMax=s.maxJourneyMins;
    if(s.drivingAllowed!=null)p.meta.drivingAvailable=s.drivingAllowed; if(s.maxTravelPct!=null)p.meta.travelMax=s.maxTravelPct;
    if(s.maxTravel!=null)p.meta.travelMax=parseInt(s.maxTravel)||p.meta.travelMax; if(s.originPostcode)p.meta.postcode=s.originPostcode;
    if(s.staleThresholdDays!=null)p.meta.staleThresholdDays=s.staleThresholdDays; }
  (v.apps||v.jobs||v.pipeline||[]).forEach(a=>{
    const job={ id:uid(), company:pick(a,["company","employer","org"],"Unknown"), role:pick(a,["role","title","jobTitle","position"],""),
      siteAddress:pick(a,["siteAddress","site","location","address","town"],""), salary:pick(a,["salary","pay","salaryMax","salaryMin"],""),
      commuteMins:pick(a,["commuteMins","commute","journeyMins","travelMins"],""),
      drivingRequired:!!(pick(a,["drivingRequired","driving","carRequired","fieldRole"],false)===true||/yes|true|required/i.test(String(pick(a,["drivingRequired","driving"],"")))),
      travelPct:pick(a,["travelPct","travel","travelPercent"],""), techFit:pick(a,["techFit","fit","fitScore"],5), wlb:pick(a,["wlb","workLife"],5),
      stage:pick(a,["stage","status"],"Target"), decision:pick(a,["decision","band","label"],""), appliedDate:pick(a,["appliedDate","dateApplied","applicationDate","applied"],""), priority:pick(a,["priority"],"Medium"), source:pick(a,["source","platform","recruiter","agency"],""), ref:pick(a,["ref","reference","vacancyRef","jobRef"],""), evidenceUrl:pick(a,["evidenceUrl","url","link"],""), nextAction:pick(a,["nextAction","action","next"],""),
      dueDate:pick(a,["dueDate","followUp","followUpDate","due"],""), mainRisk:pick(a,["mainRisk","risk","blocker"],""),
      notes:pick(a,["notes","note","comments"],""), waiting:pick(a,["waiting","waitingOn"],"me"),
      log:Array.isArray(a.log)?a.log:[], updated:pick(a,["updated","lastUpdated"],todayISO()), _raw:a };
    if(!STAGES.includes(job.stage)) job.stage="Target";
    if(job.decision && !DECISIONS.includes(job.decision)) job.decision="";
    p.jobs.push(job); rep.jobs++;
    const cn=pick(a,["contact","contactName","recruiter","recruiterName"],""), ce=pick(a,["contactEmail","email","recruiterEmail"],"");
    if(cn||ce) ensureContactForJob(job,cn,ce);
  });
  (v.outreach||v.network||v.contacts||[]).forEach(o=>{
    const name=pick(o,["name","contact","fullName"],""), email=pick(o,["email"],"");
    if(!name && !email){ rep.skipped.push("contact w/o name"); return; }
    const dup=findContactDuplicate(name,email);
    if(dup){ dup.timeline=[...(dup.timeline||[]),...(Array.isArray(o.timeline)?o.timeline:[])]; return; }
    { const status=normaliseStatus(pick(o,["status","stage"],"Planned")); const last=pick(o,["lastTouchDate","lastContact","updated"],todayISO()); p.contacts.push({id:uid(),name:name||email,email,phone:pick(o,["phone","mobile"],""),linkedinUrl:pick(o,["linkedinUrl","linkedin","linkedIn"],""),company:pick(o,["company","org","employer"],""),role:pick(o,["role","title"],""),type:pick(o,["type"],"network"),status,lastTouchDate:last,nextTouchDate:pick(o,["nextTouchDate","nextTouch"],defaultNextTouch(status,last)),followUpRule:"auto",jobIds:[],timeline:Array.isArray(o.timeline)?o.timeline:[],updated:todayISO(),_raw:o}); rep.contacts++; }
  });
  (v.variants||v.cvVariants||[]).forEach(x=>{ p.cvVariants.push({id:uid(),name:pick(x,["name","title","label"],"CV variant"),note:pick(x,["note","desc","mapping","file"],""),updated:todayISO()}); rep.cv++; });
  (v.starExamples||v.star||v.starBank||[]).forEach(x=>{ p.starBank.push({id:uid(),title:pick(x,["title","name"],"STAR"),situation:pick(x,["situation","s"],""),task:pick(x,["task","t"],""),action:pick(x,["action","a"],""),result:pick(x,["result","r"],""),updated:todayISO()}); rep.star++; });
  (v.evidence||[]).forEach(x=>{ const t=typeof x==="string"?x:pick(x,["text","bullet","content"],""); if(t){ p.evidence.push({id:uid(),text:t,updated:todayISO()}); rep.evidence++; } });
  (v.templates||[]).forEach(x=>{ p.templates.push(typeof x==="string"?{id:uid(),name:"Template",body:x}:{id:uid(),...x}); rep.templates++; });
  (v.dbsLog||v.adminNotes||[]).forEach(x=>{ p.adminNotes.push(x); rep.notes++; });
  save(); render();
  sheet("v12 import complete",`<div class="okbox">Imported into "${esc(p.meta.name)}".</div>
    <div class="kv"><b>Jobs:</b> ${rep.jobs}</div><div class="kv"><b>Contacts:</b> ${rep.contacts}</div><div class="kv"><b>CV variants:</b> ${rep.cv}</div><div class="kv"><b>STAR:</b> ${rep.star}</div><div class="kv"><b>Evidence:</b> ${rep.evidence}</div><div class="kv"><b>Templates:</b> ${rep.templates}</div><div class="kv"><b>Notes:</b> ${rep.notes}</div>
    ${rep.skipped.length?`<div class="warnbox">Skipped ${rep.skipped.length}: ${rep.skipped.join(", ")}</div>`:""}
    <p class="tiny" style="margin-top:10px">Decisions/scores re-derived by the engine. Original v12 fields kept under _raw in your backup. Spot-check a few jobs.</p>
    <button class="btn primary full" style="margin-top:12px" onclick="closeSheet();go('jobs')">View jobs</button>`);
}

/* ============================================================
   SHEET / SW / BOOT
   ============================================================ */
let sheetOpen=false;
function sheet(title,html){
  $("#modalRoot").innerHTML=`<div class="sheet-wrap" onclick="if(event.target===this)closeSheet()"><div class="sheet"><div class="grab" role="button" aria-label="Drag down to close"></div><div class="row between" style="margin-bottom:10px"><h3>${title}</h3><button class="closex" onclick="closeSheet()">×</button></div>${html}</div></div>`;
  setupSheetDrag();
  if(!sheetOpen){ sheetOpen=true; try{ history.pushState({cc:"sheet"},""); }catch(e){} }
}
function setupSheetDrag(){
  const sh=$(".sheet"), grab=$(".sheet .grab"); if(!sh||!grab) return;
  let startY=0,dy=0,drag=false;
  const start=e=>{ drag=true; dy=0; startY=(e.touches?e.touches[0].clientY:e.clientY); sh.classList.add("dragging"); };
  const move=e=>{ if(!drag)return; const y=(e.touches?e.touches[0].clientY:e.clientY); dy=Math.max(0,y-startY); sh.style.transform=`translateY(${dy}px)`; if(e.cancelable)e.preventDefault(); };
  const end=()=>{ if(!drag)return; drag=false; sh.classList.remove("dragging"); if(dy>90){ closeSheet(); } else { sh.style.transform=""; } };
  grab.addEventListener("touchstart",start,{passive:true}); grab.addEventListener("touchmove",move,{passive:false}); grab.addEventListener("touchend",end);
  grab.addEventListener("mousedown",start); window.addEventListener("mousemove",move); window.addEventListener("mouseup",end);
}
function closeSheet(){
  $("#modalRoot").innerHTML="";
  if(sheetOpen){ sheetOpen=false; try{ history.back(); }catch(e){} }
}
/* Back button / swipe-back: close sheet first; then return to Today; only then leave the app. */
window.addEventListener("popstate",()=>{
  if(sheetOpen){ sheetOpen=false; $("#modalRoot").innerHTML=""; return; }
  if(TAB!=="today"&&P()){ TAB="today"; saveUI(); render(); try{ history.pushState({cc:"tab"},""); }catch(e){} }
});
document.addEventListener("keydown",e=>{
  if(e.key==="Escape"&&sheetOpen){ closeSheet(); return; }
  if(e.key==="/"&&!sheetOpen){ const t=e.target; if(t&&(t.tagName==="INPUT"||t.tagName==="TEXTAREA"||t.tagName==="SELECT")) return;
    const s=$("#jobSearch")||$("#contactSearch"); if(s){ e.preventDefault(); s.focus(); } }
});
/* Remember last tab and filters across reloads */
function saveUI(){ try{ sessionStorage.setItem("cc_ui",JSON.stringify({TAB,jobFilter,contactFilter})); }catch(e){} }
function restoreUI(){ try{ const u=JSON.parse(sessionStorage.getItem("cc_ui")||"null");
  if(u){ if(u.TAB) TAB=u.TAB; if(u.jobFilter) jobFilter=u.jobFilter; if(u.contactFilter) contactFilter=u.contactFilter; } }catch(e){} }

let swReg=null;
function applyUpdate(){ if(swReg&&swReg.waiting) swReg.waiting.postMessage({type:"SKIP_WAITING"}); location.reload(); }
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{
    navigator.serviceWorker.register("sw.js").then(reg=>{ swReg=reg;
      reg.addEventListener("updatefound",()=>{ const nw=reg.installing; nw&&nw.addEventListener("statechange",()=>{ if(nw.state==="installed"&&navigator.serviceWorker.controller) $("#updateBar").classList.remove("hidden"); }); });
    }).catch(()=>{});
    let refreshing=false; navigator.serviceWorker.addEventListener("controllerchange",()=>{ if(!refreshing){ refreshing=true; location.reload(); } });
  });
}
$("#buildVer").textContent=BUILD;
load(); restoreUI(); try{ history.replaceState({cc:"home"},""); }catch(e){} render();
</script>
